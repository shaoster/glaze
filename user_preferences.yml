#
# Declarative preferences for user-facing settings.
# See `user_preferences.schema.yml` for the validation contract.
#
version: "1.0"
sections:
  - id: identity
    title: Identity
    description: Manage your display name and alias.
    fields:
      alias:
        type: string
        max_length: 50
        label: Alias
        hint: "How you'd like to identify yourself in the app. Not visible to others."
        storage: UserProfile

  - id: process-summary
    title: Process Summary
    description: Choose which fields appear in process summaries.
    fields:
      process_summary_fields:
        type: field-list
        provider: workflow_summary_fields
        label: Process Summary Fields
        hint: Select fields to show. Images excluded.
        storage: UserProfile.preferences
