# Pre-Certbot Nginx config for Glaze.
# After running setup-nginx.sh, Certbot will modify this file in-place to add
# SSL blocks. Do not overwrite /etc/nginx/sites-available/glaze with this file
# after Certbot has run — you will lose the TLS configuration.
#
# To update Nginx config after initial setup, edit
# /etc/nginx/sites-available/glaze on the droplet directly.

# Limit requests to 10 per second per IP, with a burst of 20.
limit_req_zone $binary_remote_addr zone=glaze_api:10m rate=10r/s;

server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN;

    # Allow large image uploads (matches Cloudinary upload size limits).
    client_max_body_size 20M;

    location / {
        limit_req zone=glaze_api burst=20 nodelay;
        proxy_pass http://localhost:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/admin/cloudinary-cleanup/archive/ {
        proxy_pass http://localhost:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_read_timeout 1h;
        proxy_send_timeout 1h;
    }
}
