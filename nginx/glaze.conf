# Pre-Certbot Nginx config for Glaze.
# After running setup-nginx.sh, Certbot will modify this file in-place to add
# SSL blocks. Do not overwrite /etc/nginx/sites-available/glaze with this file
# after Certbot has run — you will lose the TLS configuration.
#
# To update Nginx config after initial setup, edit
# /etc/nginx/sites-available/glaze on the droplet directly.

# Limit requests to 10 per second per IP, with a burst of 20.
limit_req_zone $binary_remote_addr zone=glaze_api:10m rate=10r/s;

server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN;

    include snippets/glaze-app.conf;
}
