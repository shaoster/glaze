# Nginx config for Glaze served over Tailscale with HTTPS.
# Installed by setup-tailscale.sh — do not overwrite after initial setup.
# Certs are issued by `tailscale cert` and renewed by /etc/cron.weekly/glaze-tailscale-renew.
#
# Traffic is restricted to the Tailscale subnet (100.64.0.0/10) at the firewall
# level — public internet clients cannot reach this server.

# Catch-all default: close connections whose Host header matches no server_name.
# Requests hitting the droplet's raw IP (e.g. scanners, healthcheckers) are
# silently dropped here rather than falling through to Django with an invalid
# Host, which would cause OTel middleware to raise DisallowedHost.
# This block must come first in the file so Nginx selects it as default_server.
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;
    server_name _;
    ssl_certificate     /etc/ssl/tailscale/TAILSCALE_HOSTNAME.crt;
    ssl_certificate_key /etc/ssl/tailscale/TAILSCALE_HOSTNAME.key;
    return 444;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name TAILSCALE_HOSTNAME;

    ssl_certificate     /etc/ssl/tailscale/TAILSCALE_HOSTNAME.crt;
    ssl_certificate_key /etc/ssl/tailscale/TAILSCALE_HOSTNAME.key;

    # Allow large image uploads (matches Cloudinary upload size limits).
    client_max_body_size 20M;

    location / {
        proxy_pass http://localhost:8000;
        proxy_set_header Host $server_name;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/admin/cloudinary-cleanup/archive/ {
        proxy_pass http://localhost:8000;
        proxy_set_header Host $server_name;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_read_timeout 1h;
        proxy_send_timeout 1h;
    }
}

# Redirect plain HTTP to HTTPS within the Tailscale network.
server {
    listen 80;
    listen [::]:80;
    server_name TAILSCALE_HOSTNAME;
    return 301 https://$server_name$request_uri;
}
