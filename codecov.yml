coverage:
  status:
    project:
      default:
        target: auto
        threshold: 2%
    patch:
      default:
        target: auto
        threshold: 2%

comment:
  layout: "reach,diff,flags,files"
  behavior: default

flags:
  backend:
    paths:
      - api/
    carryforward: true
  frontend:
    paths:
      - web/src/
    carryforward: true
