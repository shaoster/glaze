# Docker Compose override file for CI smoke testing.
# This runs the app in-memory without starting the redis or celery worker services.
services:
  web:
    environment:
      CELERY_BROKER_URL: ""
      REDIS_CACHE_URL: ""
    depends_on:
      db:
        condition: service_healthy
      deploy_init:
        condition: service_completed_successfully

  deploy_init:
    environment:
      REDIS_CACHE_URL: ""
    depends_on:
      db:
        condition: service_healthy
