# Docker Compose override file for CI smoke testing.
# This runs the app in-memory without starting the redis or celery worker services.
services:
  web:
    environment:
      CELERY_BROKER_URL: ""
      REDIS_CACHE_URL: ""
    depends_on:
      db:
        condition: service_healthy
      deploy_init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen(urllib.request.Request('http://localhost:8000/api/health/ready/', headers={'X-Forwarded-Proto': 'https'}))"]
      interval: 5s
      timeout: 2s
      retries: 6
      start_period: 5s

  deploy_init:
    environment:
      REDIS_CACHE_URL: ""
    depends_on:
      db:
        condition: service_healthy
