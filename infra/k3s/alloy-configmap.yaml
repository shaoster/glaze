apiVersion: v1
kind: ConfigMap
metadata:
  name: alloy-config
  namespace: monitoring
data:
  config.alloy: |
    // Node metrics via kubelet cadvisor API
    prometheus.scrape "cadvisor" {
      targets = [{
        __address__ = sys.env("NODE_IP") + ":10250",
        __scheme__  = "https",
      }]
      bearer_token_file = "/var/run/secrets/kubernetes.io/serviceaccount/token"
      tls_config {
        insecure_skip_verify = true
      }
      metrics_path    = "/metrics/cadvisor"
      scrape_interval = "60s"
      forward_to      = [prometheus.relabel.cadvisor.receiver]
    }

    // Keep only the root-cgroup and machine-level metrics needed for the dashboard.
    // The full cadvisor scrape produces ~2000 series which exhausts the Grafana Cloud
    // free-tier limit (15k) when combined with other sources.
    prometheus.relabel "cadvisor" {
      rule {
        source_labels = ["__name__"]
        regex         = "container_cpu_usage_seconds_total|container_memory_working_set_bytes|container_memory_swap|machine_memory_bytes|machine_swap_bytes|machine_cpu_cores"
        action        = "keep"
      }
      // Drop per-machine UUID labels that Grafana Cloud rejects as high-cardinality identifiers.
      rule {
        regex  = "boot_id|machine_id|system_uuid"
        action = "labeldrop"
      }
      forward_to = [prometheus.remote_write.grafana_cloud.receiver]
    }

    prometheus.remote_write "grafana_cloud" {
      endpoint {
        url = sys.env("GRAFANA_CLOUD_PROM_URL")
        basic_auth {
          username = sys.env("GRAFANA_CLOUD_PROM_USERNAME")
          password = sys.env("GRAFANA_CLOUD_PROM_PASSWORD")
        }
      }
    }

    // Pod log collection — scrapes container stdout/stderr via k8s API.
    // No overlap with OTEL Collector, which receives OTLP-pushed structured app logs only.
    // Node filter prevents duplicate log shipping when multiple DaemonSet pods run on
    // different nodes — each Alloy pod only tails pods scheduled on its own node.
    discovery.kubernetes "pods" {
      role = "pod"
    }

    discovery.relabel "pods_on_this_node" {
      targets = discovery.kubernetes.pods.targets
      rule {
        source_labels = ["__meta_kubernetes_pod_node_name"]
        regex         = sys.env("NODE_NAME")
        action        = "keep"
      }
      // Only tail glaze app pods — loki.source.kubernetes opens one persistent
      // log stream per container via the k3s API server, spawning ~500 goroutines
      // each. Tailing all 18 containers cluster-wide generated ~9k goroutines and
      // pinned k3s at 80% CPU on the single-core node.
      rule {
        source_labels = ["__meta_kubernetes_namespace"]
        regex         = "default"
        action        = "keep"
      }
    }

    loki.source.kubernetes "pods" {
      targets    = discovery.relabel.pods_on_this_node.output
      forward_to = [loki.write.grafana_cloud.receiver]
    }

    loki.write "grafana_cloud" {
      endpoint {
        url = sys.env("GRAFANA_CLOUD_LOKI_URL")
        basic_auth {
          username = sys.env("GRAFANA_CLOUD_LOKI_USERNAME")
          password = sys.env("GRAFANA_CLOUD_LOKI_PASSWORD")
        }
      }
    }
