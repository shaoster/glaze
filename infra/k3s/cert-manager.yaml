apiVersion: helm.cattle.io/v1
kind: HelmChart
metadata:
  name: cert-manager
  namespace: kube-system
spec:
  repo: https://charts.jetstack.io
  chart: cert-manager
  version: "v1.20.2"
  targetNamespace: cert-manager
  createNamespace: true
  valuesContent: |-
    crds:
      enabled: true
    resources:
      limits:
        memory: 128Mi
    cainjector:
      resources:
        limits:
          memory: 128Mi
    webhook:
      resources:
        limits:
          memory: 128Mi
      livenessProbe:
        timeoutSeconds: 5
      readinessProbe:
        timeoutSeconds: 5
