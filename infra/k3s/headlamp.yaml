---
apiVersion: helm.cattle.io/v1
kind: HelmChart
metadata:
  name: headlamp
  namespace: kube-system
spec:
  repo: https://kubernetes-sigs.github.io/headlamp/
  chart: headlamp
  targetNamespace: kube-system
  valuesContent: |-
    replicaCount: 1
    config:
      inCluster: true
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: tailscale-only
  namespace: kube-system
spec:
  ipAllowList:
    sourceRange:
      - 10.42.0.1/32
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: headlamp
  namespace: kube-system
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    traefik.ingress.kubernetes.io/router.middlewares: kube-system-tailscale-only@kubernetescrd
spec:
  tls:
    - hosts:
        - headlamp.potterdoc.com
      secretName: headlamp-tls
  rules:
    - host: headlamp.potterdoc.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: headlamp
                port:
                  number: 80
