---
apiVersion: v1
kind: Namespace
metadata:
  name: tailscale
---
apiVersion: external-secrets.io/v1
kind: ClusterExternalSecret
metadata:
  name: tailscale-operator-values
spec:
  namespaceSelectors:
    - matchLabels:
        kubernetes.io/metadata.name: tailscale
  refreshTime: 1h
  externalSecretSpec:
    refreshInterval: 1h
    secretStoreRef:
      name: infisical
      kind: ClusterSecretStore
    target:
      name: tailscale-operator-values
      creationPolicy: Owner
      template:
        engineVersion: v2
        data:
          oauth: |-
            oauth:
              clientId: {{ .clientId | quote }}
              clientSecret: {{ .clientSecret | quote }}
    data:
      - secretKey: clientId
        remoteRef:
          key: TAILSCALE_OAUTH_CLIENT_ID
      - secretKey: clientSecret
        remoteRef:
          key: TAILSCALE_OAUTH_CLIENT_SECRET
---
# Set resource requests on all Tailscale proxy pods (ts-traefik-tailscale etc.)
# so they get Burstable QoS and a lower OOM kill priority than BestEffort pods.
# Actual idle RSS for ts-traefik-tailscale is ~46 MiB.
apiVersion: tailscale.com/v1alpha1
kind: ProxyClass
metadata:
  name: default
  namespace: tailscale
spec:
  statefulSet:
    pod:
      tailscaleContainer:
        resources:
          requests:
            cpu: "10m"
            memory: "64Mi"
          limits:
            memory: "96Mi"
---
apiVersion: helm.cattle.io/v1
kind: HelmChart
metadata:
  name: tailscale-operator
  namespace: tailscale
spec:
  repo: https://pkgs.tailscale.com/helmcharts
  chart: tailscale-operator
  targetNamespace: tailscale
  createNamespace: true
  valuesSecrets:
    - name: tailscale-operator-values
      keys:
        - oauth
