# WHY: This cluster runs on a single-core DigitalOcean droplet (~2 GB RAM).
# All settings below deviate from k3s defaults to prevent resource exhaustion
# and control-plane thrashing on a constrained node.
#
# Without these limits, concurrent reconcile workers saturate the single CPU,
# causing API server timeouts, probe failures, and cascading pod restarts.

disable:
  # metrics-server: CPU/memory overhead not needed on single-node cluster.
  # servicelb: the cluster now uses Tailscale for tailnet-only ingress and
  # Traefik's own LoadBalancer service for the public front door.
  - metrics-server
kube-apiserver-arg:
  # Bind only to loopback — no external API server exposure needed on single-node.
  - "bind-address=127.0.0.1"
  # Default inflight limits (400/200) overwhelm a single core under load.
  - "max-requests-inflight=50"
  - "max-mutating-requests-inflight=20"
kube-controller-manager-arg:
  # Default concurrent syncs spin up too many goroutines on one core.
  - "concurrent-deployment-syncs=2"
  - "concurrent-replicaset-syncs=2"
  - "concurrent-statefulset-syncs=2"
  - "concurrent-service-syncs=1"
  - "concurrent-job-syncs=2"
# Point kubelet at a static resolv.conf with only the two unique DigitalOcean
# nameservers. Two problems make the standard paths unusable:
#   /etc/resolv.conf → 127.0.0.53 (systemd stub): Tailscale injects extra
#     nameservers via systemd-resolved, pushing the total past the 3-entry pod
#     limit and producing DNSConfigForming warnings on every pod.
#   /run/systemd/resolve/resolv.conf (uplink): DO's DHCP pushes 67.207.67.3
#     twice AND Tailscale adds more entries; the first three lines seen by
#     kubelet are "67.207.67.3 67.207.67.2 67.207.67.3" — a duplicate — which
#     still triggers the DNSConfigForming warning before deduplication.
# Fix: ensure_cluster.sh writes /etc/k3s-resolv.conf with exactly the two
# unique DO nameservers; kubelet reads that instead of either dynamic path.
kubelet-arg:
  - "resolv-conf=/etc/k3s-resolv.conf"
