apiVersion: v1
kind: Namespace
metadata:
  name: external-secrets
---
apiVersion: helm.cattle.io/v1
kind: HelmChart
metadata:
  name: external-secrets
  namespace: kube-system
spec:
  repo: https://charts.external-secrets.io
  chart: external-secrets
  version: "2.5.0"
  targetNamespace: external-secrets
  valuesContent: |-
    installCRDs: true
    # The validating webhook and its cert-controller cause helm upgrade
    # failures on this single-node cluster: cert rotation briefly sets
    # failurePolicy=Fail on ClusterSecretStore, causing any concurrent
    # helm operation to fail hard on a 5s webhook timeout. Validation
    # is not needed here since only CD applies ESO resources.
    webhook:
      create: false
    certController:
      create: false
    resources:
      requests:
        cpu: "10m"
        memory: "32Mi"
      limits:
        memory: "96Mi"
