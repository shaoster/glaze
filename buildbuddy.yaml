actions:
  - name: "Test all targets"
    triggers:
      pull_request:
        branches:
          - "*"
    steps:
      - run: "bazel build --config=ci --config=lint //..."
      - run: "bazel test --test_tag_filters=+no-coverage //..."
      - run: "bazel coverage --config=ci --combined_report=lcov //..."
