actions:
  - name: "PR Validation"
    # The node we need for our environment requires glibc 2.28+
    container_image: "ubuntu-24.04"
    triggers:
      pull_request:
        branches:
          - "*"
    steps:
      - run: "bazel build --config=ci --config=lint //..."
      - run: "bazel test --config=ci --test_tag_filters=+no-coverage //..."
      - run: "bazel coverage --config=ci --combined_report=lcov //..."
