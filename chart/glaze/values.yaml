replicaCount: 1

image:
  repository: ghcr.io/shaoster/glaze
  pullPolicy: IfNotPresent
  # Overridden by -f values-override.yaml during deploy
  tag: ""

nameOverride: ""
fullnameOverride: ""

# Sensitive variables are managed by External Secrets Operator (ESO) syncing from
# Infisical Cloud. The 'glaze-secrets' k8s Secret is owned by the ExternalSecret
# resource and populated automatically. See docs/ops/infisical-setup.md.
#
# Bootstrap prerequisite: a k8s Secret named 'infisical-auth' must exist with
# keys 'clientId' and 'clientSecret' (Infisical machine identity credentials).
# This is created by the CD workflow on each deploy.

infisical:
  # Infisical project slug — set in values-override.yaml during CD.
  projectSlug: ""

# Non-secret app config — all values overridden via -f values-override.yaml in CD.
# Keys here are documentation of what must be set; defaults are intentionally empty.
appConfig:
  allowedHost: ""
  appOrigin: ""
  inviteLinkBaseUrl: ""
  googleOauthClientId: ""
  cloudinaryCloudName: ""
  cloudinaryUploadFolder: ""
  cloudinaryUploadPreset: ""
  cloudinaryPublicUploadFolder: ""
  emailHost: ""
  emailPort: ""
  emailHostUser: ""
  emailUseSsl: ""
  defaultFromEmail: ""
  remoteRembgUrl: ""
  otelEnabled: ""
  adminUrl: "admin"

postgres:
  image: postgres:17
  user: glaze
  database: glaze
  sharedBuffers: "192MB"
  persistence:
    size: 10Gi
    storageClass: local-path
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "384Mi"

backup:
  enabled: true
  schedule: "0 * * * *"
  retentionDays: 30
  dropboxFolder: "/glaze-db-backups"
  image: postgres:17
  resources:
    requests:
      memory: "192Mi"
      cpu: "100m"
    limits:
      memory: "384Mi"

redis:
  image: redis:7-alpine
  persistence:
    size: 1Gi
    storageClass: local-path
  resources:
    requests:
      memory: "32Mi"
      cpu: "50m"
    limits:
      memory: "64Mi"

worker:
  replicaCount: 1
  image:
    repository: ghcr.io/shaoster/glaze-worker
  resources:
    requests:
      memory: "128Mi"
      cpu: "50m"
    limits:
      memory: "256Mi"

otelcol:
  enabled: true
  image: otel/opentelemetry-collector-contrib:0.126.0
  resources:
    requests:
      memory: "64Mi"
      cpu: "50m"
    limits:
      memory: "128Mi"

ingress:
  enabled: true
  className: traefik
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    traefik.ingress.kubernetes.io/router.middlewares: default-glaze-security-headers@kubernetescrd
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
  hosts:
    - host: glaze.example.com
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls:
    - secretName: glaze-tls
      hosts:
        - glaze.example.com

# Resources for web deployment
resources:
  requests:
    memory: "128Mi"
    cpu: "50m"
  limits:
    memory: "384Mi"

nodeSelector: {}
tolerations: []
affinity: {}
