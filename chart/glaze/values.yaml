replicaCount: 1

image:
  repository: ghcr.io/shaoster/glaze
  pullPolicy: IfNotPresent
  # Overridden by -f values-override.yaml during deploy
  tag: ""

nameOverride: ""
fullnameOverride: ""

# Sensitive variables are managed by External Secrets Operator (ESO) syncing from
# Infisical Cloud. The 'glaze-secrets' k8s Secret is owned by the ExternalSecret
# resource and populated automatically. See docs/ops/infisical-setup.md.
#
# Bootstrap prerequisite: a k8s Secret named 'infisical-auth' must exist with
# keys 'clientId' and 'clientSecret' (Infisical machine identity credentials).
# This is created by the CD workflow on each deploy.

infisical:
  # Infisical project slug — set in values-override.yaml during CD.
  projectSlug: ""

# Non-secret app config — all values overridden via -f values-override.yaml in CD.
# Keys here are documentation of what must be set; defaults are intentionally empty.
appConfig:
  allowedHost: ""
  appOrigin: ""
  inviteLinkBaseUrl: ""
  googleOauthClientId: ""
  r2AccountId: ""
  r2BucketName: ""
  r2PublicUrl: ""
  emailHost: ""
  emailPort: ""
  emailHostUser: ""
  emailUseSsl: ""
  defaultFromEmail: ""
  remoteRembgUrl: ""
  otelEnabled: ""
  adminUrl: "admin"

adminIngress:
  enabled: true
  host: admin.potterdoc.com
  tlsSecret: glaze-admin-tls
  public:
    enabled: false

postgres:
  image: postgres:17
  user: glaze
  database: glaze
  sharedBuffers: "32MB"
  persistence:
    size: 10Gi
    storageClass: local-path
  resources:
    requests:
      memory: "64Mi"
      cpu: "100m"
    limits:
      memory: "128Mi"

backup:
  enabled: true
  schedule: "0 * * * *"
  retentionDays: 30
  dropboxFolder: "/glaze-db-backups"
  image: postgres:17
  resources:
    requests:
      memory: "64Mi"
      cpu: "25m"
    limits:
      memory: "96Mi"

redis:
  image: redis:7-alpine
  persistence:
    size: 1Gi
    storageClass: local-path
  resources:
    requests:
      memory: "32Mi"
      cpu: "50m"
    limits:
      memory: "128Mi"

worker:
  replicaCount: 1
  image:
    repository: ghcr.io/shaoster/glaze-worker
  resources:
    requests:
      memory: "128Mi"
    limits:
      memory: "512Mi"

otelcol:
  enabled: true
  image: otel/opentelemetry-collector-contrib:0.126.0
  resources:
    requests:
      memory: "32Mi"
      cpu: "50m"
    limits:
      memory: "64Mi"

ingress:
  enabled: true
  className: traefik
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    traefik.ingress.kubernetes.io/router.middlewares: default-glaze-security-headers@kubernetescrd
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
  hosts:
    - host: glaze.example.com
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls:
    - secretName: glaze-tls
      hosts:
        - glaze.example.com

# Resources for web deployment
resources:
  requests:
    memory: "192Mi"
    cpu: "50m"
  limits:
    memory: "256Mi"

nodeSelector: {}
tolerations: []
affinity: {}

# SINGLE-NODE: These CIDRs are k3s flannel defaults for a single-node deployment.
# If the cluster ever moves to multi-node/HA or a different CNI, revisit
# middleware-health-internal.yaml and consider NetworkPolicy or mTLS instead.
network:
  # SINGLE-NODE: k3s flannel pod CIDR default. Revisit for multi-node/HA clusters.
  podCidr: "10.42.0.0/16"
  # SINGLE-NODE: k3s service CIDR default. Revisit for multi-node/HA clusters.
  serviceCidr: "10.43.0.0/16"
  # Tailscale CGNAT range — allows CD runner and other Tailscale nodes to reach /api/health/ready/.
  tailscaleCidr: "100.64.0.0/10"

mcp:
  enabled: false
  host: mcp.potterdoc.com
  apiUrl: "https://potterdoc.com"
  image:
    repository: ghcr.io/shaoster/glaze-mcp
  resources:
    requests:
      memory: "64Mi"
      cpu: "25m"
    limits:
      memory: "128Mi"
