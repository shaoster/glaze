replicaCount: 1

image:
  repository: ghcr.io/shaoster/glaze
  pullPolicy: IfNotPresent
  # Overridden by -f values-override.yaml during deploy
  tag: ""

nameOverride: ""
fullnameOverride: ""

# Sensitive variables must be in a Secret named 'glaze-secrets'.
# Create it manually on the cluster before first deploy:
#   kubectl create secret generic glaze-secrets --from-env-file=.env.production
# Expected keys: POSTGRES_PASSWORD, SECRET_KEY, CLOUDINARY_API_KEY,
# CLOUDINARY_API_SECRET, EMAIL_HOST_PASSWORD, GRAFANA_CLOUD_OTLP_TOKEN,
# MODAL_AUTH_TOKEN, GOOGLE_OAUTH_CLIENT_SECRET

# Non-secret app config — all values overridden via -f values-override.yaml in CD.
# Keys here are documentation of what must be set; defaults are intentionally empty.
appConfig:
  allowedHost: ""
  appOrigin: ""
  inviteLinkBaseUrl: ""
  googleOauthClientId: ""
  cloudinaryCloudName: ""
  cloudinaryUploadFolder: ""
  cloudinaryUploadPreset: ""
  cloudinaryPublicUploadFolder: ""
  emailHost: ""
  emailPort: ""
  emailHostUser: ""
  emailUseSsl: ""
  defaultFromEmail: ""
  remoteRembgUrl: ""
  otelEnabled: ""

postgres:
  image: postgres:17
  user: glaze
  database: glaze
  persistence:
    size: 10Gi
    storageClass: local-path
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "256Mi"

redis:
  image: redis:7-alpine
  persistence:
    size: 1Gi
    storageClass: local-path
  resources:
    requests:
      memory: "32Mi"
      cpu: "50m"
    limits:
      memory: "64Mi"

worker:
  replicaCount: 1
  resources:
    requests:
      memory: "96Mi"
      cpu: "50m"
    limits:
      memory: "192Mi"

otelcol:
  enabled: true
  image: otel/opentelemetry-collector-contrib:0.126.0
  resources:
    requests:
      memory: "64Mi"
      cpu: "50m"
    limits:
      memory: "128Mi"

ingress:
  enabled: true
  className: traefik
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
  hosts:
    - host: glaze.example.com
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls:
    - secretName: glaze-tls
      hosts:
        - glaze.example.com

# Resources for web deployment
resources:
  requests:
    memory: "96Mi"
    cpu: "50m"
  limits:
    memory: "192Mi"

nodeSelector: {}
tolerations: []
affinity: {}
