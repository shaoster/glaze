{{- if and .Values.ingress.enabled .Values.adminIngress.enabled -}}
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: {{ include "glaze.fullname" . }}-tailscale-only
  labels:
    {{- include "glaze.labels" . | nindent 4 }}
spec:
  ipAllowList:
    sourceRange:
      - {{ .Values.network.tailscaleCidr | quote }}
    ipStrategy:
      depth: 1
{{- end }}
