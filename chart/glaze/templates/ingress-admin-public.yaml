{{- if and .Values.ingress.enabled .Values.adminIngress.public.enabled -}}
{{- $fullName := include "glaze.fullname" . -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ $fullName }}-admin-public
  labels:
    {{- include "glaze.labels" . | nindent 4 }}
  annotations:
    {{- with .Values.ingress.annotations }}
    {{- range $key, $value := . }}
    {{- if ne $key "traefik.ingress.kubernetes.io/router.middlewares" }}
    {{ $key }}: {{ $value | quote }}
    {{- end }}
    {{- end }}
    {{- end }}
    traefik.ingress.kubernetes.io/router.middlewares: default-{{ $fullName }}-security-headers@kubernetescrd
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- if .Values.ingress.tls }}
  tls:
    {{- range .Values.ingress.tls }}
    - hosts:
        {{- range .hosts }}
        - {{ . | quote }}
        {{- end }}
      secretName: {{ .secretName }}
    {{- end }}
  {{- end }}
  rules:
    {{- range .Values.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          - path: /{{ $.Values.appConfig.adminUrl | trimSuffix "/" }}/
            pathType: Prefix
            backend:
              service:
                name: {{ $fullName }}-web
                port:
                  number: 80
          - path: /static/
            pathType: Prefix
            backend:
              service:
                name: {{ $fullName }}-web
                port:
                  number: 80
          - path: /api/admin/
            pathType: Prefix
            backend:
              service:
                name: {{ $fullName }}-web
                port:
                  number: 80
    {{- end }}
{{- end }}
