apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "glaze.fullname" . }}-worker
  labels:
    {{- include "glaze.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.worker.replicaCount }}
  selector:
    matchLabels:
      {{- include "glaze.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: worker
  template:
    metadata:
      labels:
        {{- include "glaze.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: worker
    spec:
      containers:
        - name: worker
          image: "{{ .Values.worker.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            runAsUser: 1001
            runAsGroup: 1001
            runAsNonRoot: true
          envFrom:
            - configMapRef:
                name: {{ include "glaze.fullname" . }}-env
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: glaze-secrets
                  key: POSTGRES_PASSWORD
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: glaze-secrets
                  key: SECRET_KEY
            - name: DATABASE_URL
              value: "postgres://{{ .Values.postgres.user }}:$(POSTGRES_PASSWORD)@{{ include "glaze.fullname" . }}-postgres:5432/{{ .Values.postgres.database }}"
            - name: CLOUDINARY_API_KEY
              valueFrom:
                secretKeyRef:
                  name: glaze-secrets
                  key: CLOUDINARY_API_KEY
            - name: CLOUDINARY_API_SECRET
              valueFrom:
                secretKeyRef:
                  name: glaze-secrets
                  key: CLOUDINARY_API_SECRET
            # Intentionally overrides the ConfigMap value (service.name=glaze) for the worker.
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: "service.name=glaze-worker"
          resources:
            {{- toYaml .Values.worker.resources | nindent 12 }}
