apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "glaze.fullname" . }}-web
  labels:
    {{- include "glaze.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "glaze.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: web
  template:
    metadata:
      labels:
        {{- include "glaze.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: web
    spec:
      containers:
        - name: web
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          startupProbe:
            httpGet:
              path: /api/health/live/
              port: 8000
              httpHeaders:
                - name: Host
                  value: {{ .Values.appConfig.allowedHost | default "localhost" | quote }}
            initialDelaySeconds: 15
            failureThreshold: 20
            periodSeconds: 5
            timeoutSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health/live/
              port: 8000
              httpHeaders:
                - name: Host
                  value: {{ .Values.appConfig.allowedHost | default "localhost" | quote }}
            periodSeconds: 30
            timeoutSeconds: 3
          readinessProbe:
            httpGet:
              path: /api/health/ready/
              port: 8000
              httpHeaders:
                - name: Host
                  value: {{ .Values.appConfig.allowedHost | default "localhost" | quote }}
            periodSeconds: 10
            timeoutSeconds: 3
          envFrom:
            - configMapRef:
                name: {{ include "glaze.fullname" . }}-env
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: glaze-secrets
                  key: POSTGRES_PASSWORD
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: glaze-secrets
                  key: SECRET_KEY
            - name: DATABASE_URL
              value: "postgres://{{ .Values.postgres.user }}:$(POSTGRES_PASSWORD)@{{ include "glaze.fullname" . }}-postgres:5432/{{ .Values.postgres.database }}"
            - name: CLOUDINARY_API_KEY
              valueFrom:
                secretKeyRef:
                  name: glaze-secrets
                  key: CLOUDINARY_API_KEY
            - name: CLOUDINARY_API_SECRET
              valueFrom:
                secretKeyRef:
                  name: glaze-secrets
                  key: CLOUDINARY_API_SECRET
            - name: EMAIL_HOST_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: glaze-secrets
                  key: EMAIL_HOST_PASSWORD
                  optional: true
            - name: MODAL_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: glaze-secrets
                  key: MODAL_AUTH_TOKEN
                  optional: true
            - name: GOOGLE_OAUTH_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: glaze-secrets
                  key: GOOGLE_OAUTH_CLIENT_SECRET
                  optional: true
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "glaze.fullname" . }}-web
  labels:
    {{- include "glaze.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 8000
      protocol: TCP
      name: http
  selector:
    {{- include "glaze.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: web
