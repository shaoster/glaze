{{- if and .Values.ingress.enabled .Values.adminIngress.enabled -}}
{{- $fullName := include "glaze.fullname" . -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ $fullName }}-admin
  labels:
    {{- include "glaze.labels" . | nindent 4 }}
  annotations:
    {{- with .Values.ingress.annotations }}
    {{- range $key, $value := . }}
    {{- if and (ne $key "traefik.ingress.kubernetes.io/router.middlewares") (ne $key "traefik.ingress.kubernetes.io/router.entrypoints") }}
    {{ $key }}: {{ $value | quote }}
    {{- end }}
    {{- end }}
    {{- end }}
    traefik.ingress.kubernetes.io/router.entrypoints: "websecure-tailscale"
    traefik.ingress.kubernetes.io/router.middlewares: default-{{ $fullName }}-security-headers@kubernetescrd
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- if .Values.adminIngress.tlsSecret }}
  tls:
    - hosts:
        - {{ .Values.adminIngress.host | quote }}
      secretName: {{ .Values.adminIngress.tlsSecret }}
  {{- end }}
  rules:
    - host: {{ .Values.adminIngress.host | quote }}
      http:
        paths:
          - path: /{{ $.Values.appConfig.adminUrl | trimSuffix "/" }}/
            pathType: Prefix
            backend:
              service:
                name: {{ $fullName }}-web
                port:
                  number: 80
          - path: /static/
            pathType: Prefix
            backend:
              service:
                name: {{ $fullName }}-web
                port:
                  number: 80
          - path: /api/admin/
            pathType: Prefix
            backend:
              service:
                name: {{ $fullName }}-web
                port:
                  number: 80
{{- end }}
