apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "glaze.fullname" . }}-postgres
  labels:
    {{- include "glaze.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "glaze.fullname" . }}-postgres
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "glaze.name" . }}-postgres
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "glaze.name" . }}-postgres
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      securityContext: {}
      initContainers:
        - name: fix-data-perms
          image: busybox:1.37
          command: ["sh", "-c", "chmod 700 /var/lib/postgresql/data || true"]
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          securityContext:
            runAsUser: 0
      containers:
        - name: postgres
          image: {{ .Values.postgres.image }}
          args:
            - -c
            - shared_buffers={{ .Values.postgres.sharedBuffers }}
            - -c
            - work_mem=8MB
            - -c
            - maintenance_work_mem=64MB
            - -c
            - max_connections=60
          env:
            - name: POSTGRES_DB
              value: {{ .Values.postgres.database }}
            - name: POSTGRES_USER
              value: {{ .Values.postgres.user }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: glaze-secrets
                  key: POSTGRES_PASSWORD
          ports:
            - containerPort: 5432
              name: postgres
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "{{ .Values.postgres.user }}", "-d", "{{ .Values.postgres.database }}"]
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "{{ .Values.postgres.user }}", "-d", "{{ .Values.postgres.database }}"]
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            {{- toYaml .Values.postgres.resources | nindent 12 }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: [ "ReadWriteOnce" ]
        storageClassName: {{ .Values.postgres.persistence.storageClass }}
        resources:
          requests:
            storage: {{ .Values.postgres.persistence.size }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "glaze.fullname" . }}-postgres
  labels:
    {{- include "glaze.labels" . | nindent 4 }}
spec:
  ports:
    - port: 5432
      targetPort: 5432
      name: postgres
  selector:
    app.kubernetes.io/name: {{ include "glaze.name" . }}-postgres
    app.kubernetes.io/instance: {{ .Release.Name }}
