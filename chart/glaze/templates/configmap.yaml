apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "glaze.fullname" . }}-otel-config
  labels:
    {{- include "glaze.labels" . | nindent 4 }}
data:
  otel-collector-config.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317

      postgresql:
        endpoint: {{ include "glaze.fullname" . }}-postgres:5432
        username: {{ .Values.postgres.user }}
        password: ${env:POSTGRES_PASSWORD}
        databases: [{{ .Values.postgres.database }}]
        collection_interval: 30s
        tls:
          insecure: true

      redis:
        endpoint: {{ include "glaze.fullname" . }}-redis:6379
        collection_interval: 30s

    exporters:
      otlphttp:
        endpoint: https://otlp-gateway-prod-us-east-3.grafana.net/otlp
        headers:
          authorization: "Basic ${env:GRAFANA_CLOUD_OTLP_TOKEN}"

    service:
      pipelines:
        traces:
          receivers: [otlp]
          exporters: [otlphttp]
        logs:
          receivers: [otlp]
          exporters: [otlphttp]
        metrics:
          receivers: [otlp, postgresql, redis]
          exporters: [otlphttp]
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "glaze.fullname" . }}-env
  labels:
    {{- include "glaze.labels" . | nindent 4 }}
data:
  CELERY_BROKER_URL: "redis://{{ include "glaze.fullname" . }}-redis:6379/0"
  REDIS_CACHE_URL: "redis://{{ include "glaze.fullname" . }}-redis:6379/1"
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://{{ include "glaze.fullname" . }}-otelcol:4317"
  OTEL_RESOURCE_ATTRIBUTES: "service.name=glaze"
  PRODUCTION: "true"
  ALLOWED_HOST: {{ .Values.appConfig.allowedHost | quote }}
  APP_ORIGIN: {{ .Values.appConfig.appOrigin | quote }}
  INVITE_LINK_BASE_URL: {{ .Values.appConfig.inviteLinkBaseUrl | quote }}
  GOOGLE_OAUTH_CLIENT_ID: {{ .Values.appConfig.googleOauthClientId | quote }}
  ADMIN_URL: {{ .Values.appConfig.adminUrl | quote }}
  {{- if .Values.adminIngress.enabled }}
  ADMIN_INGRESS_HOST: {{ .Values.adminIngress.host | quote }}
  {{- end }}
  CLOUDINARY_CLOUD_NAME: {{ .Values.appConfig.cloudinaryCloudName | quote }}
  CLOUDINARY_UPLOAD_FOLDER: {{ .Values.appConfig.cloudinaryUploadFolder | quote }}
  CLOUDINARY_UPLOAD_PRESET: {{ .Values.appConfig.cloudinaryUploadPreset | quote }}
  CLOUDINARY_PUBLIC_UPLOAD_FOLDER: {{ .Values.appConfig.cloudinaryPublicUploadFolder | quote }}
  {{- with .Values.appConfig.emailHost }}
  EMAIL_HOST: {{ . | quote }}
  {{- end }}
  {{- with .Values.appConfig.emailPort }}
  EMAIL_PORT: {{ . | quote }}
  {{- end }}
  {{- with .Values.appConfig.emailHostUser }}
  EMAIL_HOST_USER: {{ . | quote }}
  {{- end }}
  {{- with .Values.appConfig.emailUseSsl }}
  EMAIL_USE_SSL: {{ . | quote }}
  {{- end }}
  {{- with .Values.appConfig.defaultFromEmail }}
  DEFAULT_FROM_EMAIL: {{ . | quote }}
  {{- end }}
  {{- with .Values.appConfig.remoteRembgUrl }}
  REMOTE_REMBG_URL: {{ . | quote }}
  {{- end }}
  {{- with .Values.appConfig.otelEnabled }}
  OTEL_ENABLED: {{ . | quote }}
  {{- end }}
