name: Setup Bazel CI
description: Restore bazel repository + disk caches and inject the BuildBuddy API key into .bazelrc for the current job.

inputs:
  cache-key-prefix:
    description: Job-specific prefix for the disk cache key (e.g. lint, coverage, image). Lets each job have its own primary cache while still falling back to the shared bazel-disk- pool.
    required: true
  deps-key:
    description: preflight-derived dependency hash; invalidates caches when MODULE.bazel/lock files change.
    required: true
  buildbuddy-api-key:
    description: BuildBuddy remote API key. The caller must read this from secrets and pass it explicitly — composite actions cannot access secrets directly.
    required: true
  workdir:
    description: Directory where repo-local files should be updated. Defaults to the current workspace root.
    required: false
    default: .

runs:
  using: composite
  steps:
    - name: Cache pnpm store
      uses: actions/cache@v4
      with:
        path: |
          ~/.local/share/pnpm/store
          ~/Library/Caches/pnpm/store
        key: pnpm-store-${{ runner.os }}-${{ inputs.deps-key }}
        restore-keys: pnpm-store-${{ runner.os }}-

    - name: Cache Bazel Repository
      uses: actions/cache@v4
      with:
        path: ~/.cache/bazel-repo
        key: bazel-repo-${{ runner.os }}-${{ inputs.deps-key }}
        restore-keys: bazel-repo-${{ runner.os }}-

    - name: Cache Bazel Disk
      uses: actions/cache@v4
      with:
        path: ~/.cache/bazel-disk-cache
        key: bazel-disk-${{ runner.os }}-${{ inputs.cache-key-prefix }}-${{ inputs.deps-key }}-${{ github.run_id }}
        restore-keys: |
          bazel-disk-${{ runner.os }}-${{ inputs.cache-key-prefix }}-${{ inputs.deps-key }}-
          bazel-disk-${{ runner.os }}-

    - name: Inject BuildBuddy API key, repo cache, and disk cache paths into .bazelrc
      shell: bash
      working-directory: ${{ inputs.workdir }}
      run: |
        echo "" >> .bazelrc
        echo "common:ci --remote_header=x-buildbuddy-api-key=${{ inputs.buildbuddy-api-key }}" >> .bazelrc
        echo "common --repository_cache=~/.cache/bazel-repo" >> .bazelrc
        echo "build --disk_cache=~/.cache/bazel-disk-cache" >> .bazelrc
