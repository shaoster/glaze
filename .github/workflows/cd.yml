name: CD

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      sha:
        description: "Commit SHA to deploy (defaults to the selected branch HEAD)"
        required: false
        default: ""

env:
  DEPLOY_SHA: ${{ github.event.workflow_run.head_sha || inputs.sha || github.sha }}

jobs:
  deploy:
    name: Deploy to droplet
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch'
    environment: glaze-droplet
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ env.DEPLOY_SHA }}

      - name: Verify deploy inputs
        env:
          DEPLOY_HOST_TAILSCALE: ${{ vars.DEPLOY_HOST_TAILSCALE }}
          TAILSCALE_AUTH_KEY: ${{ secrets.TAILSCALE_AUTH_KEY }}
          INFISICAL_CLIENT_ID: ${{ secrets.INFISICAL_CLIENT_ID }}
          INFISICAL_CLIENT_SECRET: ${{ secrets.INFISICAL_CLIENT_SECRET }}
          INFISICAL_PROJECT_SLUG: ${{ vars.INFISICAL_PROJECT_SLUG }}
          ALLOWED_HOST: ${{ vars.ALLOWED_HOST }}
          APP_ORIGIN: ${{ vars.APP_ORIGIN }}
          GOOGLE_OAUTH_CLIENT_ID: ${{ vars.GOOGLE_OAUTH_CLIENT_ID }}
          CLOUDINARY_CLOUD_NAME: ${{ vars.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_UPLOAD_FOLDER: ${{ vars.CLOUDINARY_UPLOAD_FOLDER }}
          CLOUDINARY_UPLOAD_PRESET: ${{ vars.CLOUDINARY_UPLOAD_PRESET }}
          CLOUDINARY_PUBLIC_UPLOAD_FOLDER: ${{ vars.CLOUDINARY_PUBLIC_UPLOAD_FOLDER }}
          MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
          MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}
        run: |
          critical="DEPLOY_HOST_TAILSCALE TAILSCALE_AUTH_KEY INFISICAL_CLIENT_ID INFISICAL_CLIENT_SECRET INFISICAL_PROJECT_SLUG ALLOWED_HOST APP_ORIGIN CLOUDINARY_CLOUD_NAME CLOUDINARY_UPLOAD_FOLDER CLOUDINARY_UPLOAD_PRESET CLOUDINARY_PUBLIC_UPLOAD_FOLDER"
          features="EMAIL_HOST EMAIL_PORT EMAIL_HOST_USER EMAIL_USE_SSL DEFAULT_FROM_EMAIL INVITE_LINK_BASE_URL REMOTE_REMBG_URL OTEL_ENABLED MODAL_TOKEN_ID MODAL_TOKEN_SECRET"

          missing_critical=0
          for name in $critical; do
            if [ -z "${!name:-}" ]; then
              echo "CRITICAL: $name is required for deploy." >&2
              missing_critical=1
            fi
          done

          if [ "$missing_critical" -ne 0 ]; then
            exit 1
          fi

          echo "All critical variables present. Checking optional feature variables..."
          for name in $features; do
            if [ -z "${!name:-}" ]; then
              echo "WARNING: $name is missing. Some features may be disabled or use defaults."
            fi
          done

      - name: Connect to Tailscale
        uses: tailscale/github-action@6cae46e2d796f265265cfcf628b72a32b4d7cade  # v3
        with:
          authkey: ${{ secrets.TAILSCALE_AUTH_KEY }}
          tags: tag:ci

      - name: Bootstrap ESO credentials
        env:
          DEPLOY_HOST: ${{ vars.DEPLOY_HOST_TAILSCALE }}
          INFISICAL_CLIENT_ID: ${{ secrets.INFISICAL_CLIENT_ID }}
          INFISICAL_CLIENT_SECRET: ${{ secrets.INFISICAL_CLIENT_SECRET }}
        run: |
          # Push Infisical machine identity to cluster so ESO can authenticate.
          # ESO owns the full glaze-secrets sync from here; CD no longer manages app secrets.
          # Credentials are passed as env vars on the remote side to avoid shell quoting issues.
          ssh -o StrictHostKeyChecking=no "${DEPLOY_HOST}" \
            INFISICAL_CLIENT_ID="${INFISICAL_CLIENT_ID}" \
            INFISICAL_CLIENT_SECRET="${INFISICAL_CLIENT_SECRET}" \
            'KUBECONFIG=/etc/rancher/k3s/k3s.yaml kubectl create secret generic infisical-auth \
              --from-literal=clientId="$INFISICAL_CLIENT_ID" \
              --from-literal=clientSecret="$INFISICAL_CLIENT_SECRET" \
              --dry-run=client -o yaml | \
            KUBECONFIG=/etc/rancher/k3s/k3s.yaml kubectl apply -f -'

      - name: Ship chart and render values override
        env:
          DEPLOY_HOST: ${{ vars.DEPLOY_HOST_TAILSCALE }}
          ALLOWED_HOST: ${{ vars.ALLOWED_HOST }}
          APP_ORIGIN: ${{ vars.APP_ORIGIN }}
          INVITE_LINK_BASE_URL: ${{ vars.INVITE_LINK_BASE_URL }}
          GOOGLE_OAUTH_CLIENT_ID: ${{ vars.GOOGLE_OAUTH_CLIENT_ID }}
          CLOUDINARY_CLOUD_NAME: ${{ vars.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_UPLOAD_FOLDER: ${{ vars.CLOUDINARY_UPLOAD_FOLDER }}
          CLOUDINARY_UPLOAD_PRESET: ${{ vars.CLOUDINARY_UPLOAD_PRESET }}
          CLOUDINARY_PUBLIC_UPLOAD_FOLDER: ${{ vars.CLOUDINARY_PUBLIC_UPLOAD_FOLDER }}
          EMAIL_HOST: ${{ vars.EMAIL_HOST }}
          EMAIL_PORT: ${{ vars.EMAIL_PORT }}
          EMAIL_HOST_USER: ${{ vars.EMAIL_HOST_USER }}
          EMAIL_USE_SSL: ${{ vars.EMAIL_USE_SSL }}
          DEFAULT_FROM_EMAIL: ${{ vars.DEFAULT_FROM_EMAIL }}
          REMOTE_REMBG_URL: ${{ vars.REMOTE_REMBG_URL }}
          OTEL_ENABLED: ${{ vars.OTEL_ENABLED }}
          INFISICAL_PROJECT_SLUG: ${{ vars.INFISICAL_PROJECT_SLUG }}
        run: |
          cat > /tmp/values-override.yaml << EOF
          image:
            tag: "${{ env.DEPLOY_SHA }}"
          infisical:
            projectSlug: "${INFISICAL_PROJECT_SLUG}"
          appConfig:
            allowedHost: "${ALLOWED_HOST}"
            appOrigin: "${APP_ORIGIN}"
            inviteLinkBaseUrl: "${INVITE_LINK_BASE_URL}"
            googleOauthClientId: "${GOOGLE_OAUTH_CLIENT_ID}"
            cloudinaryCloudName: "${CLOUDINARY_CLOUD_NAME}"
            cloudinaryUploadFolder: "${CLOUDINARY_UPLOAD_FOLDER}"
            cloudinaryUploadPreset: "${CLOUDINARY_UPLOAD_PRESET}"
            cloudinaryPublicUploadFolder: "${CLOUDINARY_PUBLIC_UPLOAD_FOLDER}"
            emailHost: "${EMAIL_HOST}"
            emailPort: "${EMAIL_PORT}"
            emailHostUser: "${EMAIL_HOST_USER}"
            emailUseSsl: "${EMAIL_USE_SSL}"
            defaultFromEmail: "${DEFAULT_FROM_EMAIL}"
            remoteRembgUrl: "${REMOTE_REMBG_URL}"
            otelEnabled: "${OTEL_ENABLED}"
          ingress:
            hosts:
              - host: "${ALLOWED_HOST}"
                paths:
                  - path: /
                    pathType: ImplementationSpecific
            tls:
              - secretName: glaze-tls
                hosts:
                  - "${ALLOWED_HOST}"
          EOF
          scp -o StrictHostKeyChecking=no -r chart/glaze "${DEPLOY_HOST}":~/glaze-chart-deploy/
          scp -o StrictHostKeyChecking=no /tmp/values-override.yaml "${DEPLOY_HOST}":~/glaze-values-override.yaml

      - name: Deploy via Helm
        env:
          DEPLOY_HOST: ${{ vars.DEPLOY_HOST_TAILSCALE }}
        run: |
          ssh -o StrictHostKeyChecking=no "${DEPLOY_HOST}" "
            KUBECONFIG=/etc/rancher/k3s/k3s.yaml helm upgrade --install glaze ~/glaze-chart-deploy/glaze/ \
              -f ~/glaze-values-override.yaml \
              --timeout 5m \
              --wait
          "


      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view "release-${{ env.DEPLOY_SHA }}" >/dev/null 2>&1 || \
          gh release create "release-${{ env.DEPLOY_SHA }}" \
            --title "Build ${{ env.DEPLOY_SHA }}" \
            --notes "Docker image: \`ghcr.io/shaoster/glaze:${{ env.DEPLOY_SHA }}\`"

  deploy-modal:
    name: Deploy Services to Modal
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ env.DEPLOY_SHA }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install Modal
        run: pip install modal

      - name: Deploy to Modal
        env:
          MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
          MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}
        run: |
          shopt -s nullglob
          deployed=0
          for service in services/*.py; do
            if [ "$(basename "$service")" = "__init__.py" ]; then
              continue
            fi

            modal deploy "$service"
            deployed=1
          done

          if [ "$deployed" -eq 0 ]; then
            echo "No Modal service modules found under services/." >&2
            exit 1
          fi
