name: CD

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      sha:
        description: "Commit SHA to deploy (defaults to the selected branch HEAD)"
        required: false
        default: ""

env:
  DEPLOY_SHA: ${{ github.event.workflow_run.head_sha || inputs.sha || github.sha }}

jobs:
  deploy:
    name: Deploy to droplet
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch'
    environment: glaze-droplet
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ env.DEPLOY_SHA }}

      - name: Verify deploy inputs
        env:
          DEPLOY_HOST: ${{ vars.DEPLOY_HOST }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          ALLOWED_HOST: ${{ vars.ALLOWED_HOST }}
          APP_ORIGIN: ${{ vars.APP_ORIGIN }}
          GOOGLE_OAUTH_CLIENT_ID: ${{ vars.GOOGLE_OAUTH_CLIENT_ID }}
          VITE_GOOGLE_CLIENT_ID: ${{ vars.VITE_GOOGLE_CLIENT_ID }}
          CLOUDINARY_CLOUD_NAME: ${{ vars.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
          CLOUDINARY_UPLOAD_FOLDER: ${{ vars.CLOUDINARY_UPLOAD_FOLDER }}
          CLOUDINARY_UPLOAD_PRESET: ${{ vars.CLOUDINARY_UPLOAD_PRESET }}
          CLOUDINARY_PUBLIC_UPLOAD_FOLDER: ${{ vars.CLOUDINARY_PUBLIC_UPLOAD_FOLDER }}
          EMAIL_HOST: ${{ vars.EMAIL_HOST }}
          EMAIL_PORT: ${{ vars.EMAIL_PORT }}
          EMAIL_HOST_USER: ${{ vars.EMAIL_HOST_USER }}
          EMAIL_HOST_PASSWORD: ${{ secrets.EMAIL_HOST_PASSWORD }}
          EMAIL_USE_SSL: ${{ vars.EMAIL_USE_SSL }}
          DEFAULT_FROM_EMAIL: ${{ vars.DEFAULT_FROM_EMAIL }}
          INVITE_LINK_BASE_URL: ${{ vars.INVITE_LINK_BASE_URL }}
          LOGTAIL_SOURCE_TOKEN: ${{ vars.LOGTAIL_SOURCE_TOKEN }}
          REMOTE_REMBG_URL: ${{ vars.REMOTE_REMBG_URL }}
          OTEL_ENABLED: ${{ vars.OTEL_ENABLED }}
          GRAFANA_CLOUD_OTLP_TOKEN: ${{ secrets.GRAFANA_CLOUD_OTLP_TOKEN }}
          MODAL_AUTH_TOKEN: ${{ secrets.MODAL_AUTH_TOKEN }}
          MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
          MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}
        run: |
          required="DEPLOY_HOST SECRET_KEY POSTGRES_PASSWORD ALLOWED_HOST APP_ORIGIN GOOGLE_OAUTH_CLIENT_ID VITE_GOOGLE_CLIENT_ID CLOUDINARY_CLOUD_NAME CLOUDINARY_API_KEY CLOUDINARY_API_SECRET CLOUDINARY_UPLOAD_FOLDER CLOUDINARY_UPLOAD_PRESET CLOUDINARY_PUBLIC_UPLOAD_FOLDER EMAIL_HOST EMAIL_PORT EMAIL_HOST_USER EMAIL_HOST_PASSWORD EMAIL_USE_SSL DEFAULT_FROM_EMAIL INVITE_LINK_BASE_URL LOGTAIL_SOURCE_TOKEN REMOTE_REMBG_URL OTEL_ENABLED GRAFANA_CLOUD_OTLP_TOKEN MODAL_AUTH_TOKEN MODAL_TOKEN_ID MODAL_TOKEN_SECRET"
          missing=0
          for name in $required; do
            if [ -z "${!name:-}" ]; then
              echo "$name is required for deploy." >&2
              missing=1
            fi
          done

          exit "$missing"

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H $(echo "${{ vars.DEPLOY_HOST }}" | cut -d@ -f2) >> ~/.ssh/known_hosts

      - name: Render and ship .env
        env:
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          ALLOWED_HOST: ${{ vars.ALLOWED_HOST }}
          APP_ORIGIN: ${{ vars.APP_ORIGIN }}
          GOOGLE_OAUTH_CLIENT_ID: ${{ vars.GOOGLE_OAUTH_CLIENT_ID }}
          VITE_GOOGLE_CLIENT_ID: ${{ vars.VITE_GOOGLE_CLIENT_ID }}
          CLOUDINARY_CLOUD_NAME: ${{ vars.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
          CLOUDINARY_UPLOAD_FOLDER: ${{ vars.CLOUDINARY_UPLOAD_FOLDER }}
          CLOUDINARY_UPLOAD_PRESET: ${{ vars.CLOUDINARY_UPLOAD_PRESET }}
          CLOUDINARY_PUBLIC_UPLOAD_FOLDER: ${{ vars.CLOUDINARY_PUBLIC_UPLOAD_FOLDER }}
          EMAIL_HOST: ${{ vars.EMAIL_HOST }}
          EMAIL_PORT: ${{ vars.EMAIL_PORT }}
          EMAIL_HOST_USER: ${{ vars.EMAIL_HOST_USER }}
          EMAIL_HOST_PASSWORD: ${{ secrets.EMAIL_HOST_PASSWORD }}
          EMAIL_USE_SSL: ${{ vars.EMAIL_USE_SSL }}
          DEFAULT_FROM_EMAIL: ${{ vars.DEFAULT_FROM_EMAIL }}
          INVITE_LINK_BASE_URL: ${{ vars.INVITE_LINK_BASE_URL }}
          LOGTAIL_SOURCE_TOKEN: ${{ vars.LOGTAIL_SOURCE_TOKEN }}
          REMOTE_REMBG_URL: ${{ vars.REMOTE_REMBG_URL }}
          MODAL_AUTH_TOKEN: ${{ secrets.MODAL_AUTH_TOKEN }}
          GRAFANA_CLOUD_OTLP_TOKEN: ${{ secrets.GRAFANA_CLOUD_OTLP_TOKEN }}
          OTEL_ENABLED: ${{ vars.OTEL_ENABLED }}
        run: |
          envsubst < .env.production.template > /tmp/.env
          scp /tmp/.env "${{ vars.DEPLOY_HOST }}":~/glaze/.env

      - name: Deploy
        run: ./deploy.sh "${{ vars.DEPLOY_HOST }}" "${{ env.DEPLOY_SHA }}"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view "release-${{ env.DEPLOY_SHA }}" >/dev/null 2>&1 || \
          gh release create "release-${{ env.DEPLOY_SHA }}" \
            --title "Build ${{ env.DEPLOY_SHA }}" \
            --notes "Docker image: \`ghcr.io/shaoster/glaze:${{ env.DEPLOY_SHA }}\`"

  deploy-modal:
    name: Deploy ML Microservice to Modal
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ env.DEPLOY_SHA }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install Modal
        run: pip install modal

      - name: Deploy to Modal
        env:
          MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
          MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}
        run: modal deploy tools/piece_image_crop_service.py
