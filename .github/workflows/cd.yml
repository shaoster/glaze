name: CD

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      sha:
        description: 'Commit SHA to build and deploy (defaults to the selected branch HEAD)'
        required: false
        default: ''

env:
  DEPLOY_SHA: ${{ github.event.workflow_run.head_sha || inputs.sha || github.sha }}

jobs:
  publish:
    name: Publish Docker image
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch'
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ env.DEPLOY_SHA }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ghcr.io/shaoster/glaze:latest
            ghcr.io/shaoster/glaze:${{ env.DEPLOY_SHA }}
          build-args: |
            VITE_GOOGLE_CLIENT_ID=${{ secrets.VITE_GOOGLE_CLIENT_ID }}
          labels: |
            org.opencontainers.image.revision=${{ env.DEPLOY_SHA }}

  deploy:
    name: Deploy to droplet
    runs-on: ubuntu-latest
    needs: [publish]
    environment: glaze-tailscale
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ env.DEPLOY_SHA }}

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H $(echo "${{ vars.DEPLOY_HOST }}" | cut -d@ -f2) >> ~/.ssh/known_hosts

      - name: Deploy
        run: ./deploy.sh "${{ vars.DEPLOY_HOST }}"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "release-${{ env.DEPLOY_SHA }}" \
            --title "Build ${{ env.DEPLOY_SHA }}" \
            --notes "Docker image: \`ghcr.io/shaoster/glaze:${{ env.DEPLOY_SHA }}\`" \
            --latest
