name: CD

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  # Chart-only pushes skip CI entirely (chart/** is in CI paths-ignore).
  # Trigger CD directly so helm changes don't require a manual dispatch.
  push:
    branches: [main]
    paths:
      - "chart/**"
  workflow_dispatch:
    inputs:
      sha:
        description: "Commit SHA to deploy (defaults to the selected branch HEAD)"
        required: false
        default: ""

env:
  DEPLOY_SHA: ${{ github.event.workflow_run.head_sha || inputs.sha || github.sha }}

jobs:
  deploy:
    name: Deploy to droplet
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' || github.event_name == 'push'
    environment: glaze-droplet
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ env.DEPLOY_SHA }}

      - name: Connect to Tailscale
        uses: tailscale/github-action@6cae46e2d796f265265cfcf628b72a32b4d7cade  # v3
        with:
          authkey: ${{ secrets.TAILSCALE_AUTH_KEY }}
          tags: tag:ci

      - name: Resolve image tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Chart-only pushes (chart/** without a CI run) have no Docker image
          # built for github.sha. Reuse the most recently deployed image tag
          # from the latest GitHub release instead.
          if [ "${{ github.event_name }}" = "push" ] && [ -z "${{ github.event.workflow_run.head_sha }}" ]; then
            IMAGE_TAG=$(gh release list --repo ${{ github.repository }} --limit 1 --json tagName --jq '.[0].tagName' | sed 's/release-//')
            if [ -z "$IMAGE_TAG" ]; then
              echo "ERROR: Could not resolve image tag from latest release." >&2
              exit 1
            fi
            echo "Chart-only deploy: reusing image tag $IMAGE_TAG"
          else
            IMAGE_TAG="${{ env.DEPLOY_SHA }}"
          fi
          echo "IMAGE_TAG=$IMAGE_TAG" >> "$GITHUB_ENV"

      - name: Ensure cluster
        env:
          DEPLOY_HOST: ${{ vars.DEPLOY_HOST_TAILSCALE }}
          INFISICAL_CLIENT_ID: ${{ secrets.INFISICAL_CLIENT_ID }}
          INFISICAL_CLIENT_SECRET: ${{ secrets.INFISICAL_CLIENT_SECRET }}
          INFISICAL_PROJECT_SLUG: ${{ vars.INFISICAL_PROJECT_SLUG }}
        run: tools/ensure_cluster.sh "${DEPLOY_HOST}"

      - name: Render Helm values override
        env:
          INFISICAL_PROJECT_SLUG: ${{ vars.INFISICAL_PROJECT_SLUG }}
          ALLOWED_HOST: ${{ vars.ALLOWED_HOST }}
          APP_ORIGIN: ${{ vars.APP_ORIGIN }}
          GOOGLE_OAUTH_CLIENT_ID: ${{ vars.GOOGLE_OAUTH_CLIENT_ID }}
          CLOUDINARY_CLOUD_NAME: ${{ vars.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_UPLOAD_FOLDER: ${{ vars.CLOUDINARY_UPLOAD_FOLDER }}
          CLOUDINARY_UPLOAD_PRESET: ${{ vars.CLOUDINARY_UPLOAD_PRESET }}
          CLOUDINARY_PUBLIC_UPLOAD_FOLDER: ${{ vars.CLOUDINARY_PUBLIC_UPLOAD_FOLDER }}
        run: tools/render_values.sh > /tmp/values-override.yaml

      - name: Deploy via Helm
        env:
          DEPLOY_HOST: ${{ vars.DEPLOY_HOST_TAILSCALE }}
        run: tools/helm_deploy.sh "${DEPLOY_HOST}" chart/glaze /tmp/values-override.yaml

      - name: Create GitHub Release
        # Chart-only push deploys reuse an existing image tag; DEPLOY_SHA is the
        # chart commit with no corresponding Docker image. Skip release creation
        # so the latest release always points to a real, pullable image SHA.
        if: github.event_name != 'push'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view "release-${{ env.DEPLOY_SHA }}" >/dev/null 2>&1 || \
          gh release create "release-${{ env.DEPLOY_SHA }}" \
            --title "Build ${{ env.DEPLOY_SHA }}" \
            --notes "Docker image: \`ghcr.io/shaoster/glaze:${{ env.DEPLOY_SHA }}\`"

  deploy-modal:
    name: Deploy Services to Modal
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' || github.event_name == 'push'
    environment: glaze-droplet
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ env.DEPLOY_SHA }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install Modal
        run: pip install modal

      - name: Deploy to Modal
        env:
          MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
          MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}
        run: |
          shopt -s nullglob
          deployed=0
          for service in services/*.py; do
            if [ "$(basename "$service")" = "__init__.py" ]; then
              continue
            fi

            modal deploy "$service"
            deployed=1
          done

          if [ "$deployed" -eq 0 ]; then
            echo "No Modal service modules found under services/." >&2
            exit 1
          fi
