# Simple workflow for deploying static content to GitHub Pages
name: Deploy static content to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Single deploy job since we're just deploying
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute deps key
        id: deps
        shell: bash
        run: |
          bazel="$(sha256sum MODULE.bazel .bazelversion | sha256sum | cut -d' ' -f1)"
          node="$(sha256sum web/pnpm-lock.yaml | cut -d' ' -f1)"
          echo "deps_key=$(printf '%s' "${bazel}-${node}" | sha256sum | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

      - uses: ./.github/actions/setup-bazel-ci
        with:
          cache-key-prefix: pages
          deps-key: ${{ steps.deps.outputs.deps_key }}
          buildbuddy-api-key: ${{ secrets.BAZEL_REMOTE_API_KEY }}

      - name: Build Storybook
        run: bazel build --config=ci //web:storybook_build

      - name: Copy Storybook to pages
        run: |
          mkdir -p pages/storybook
          cp -r bazel-bin/web/storybook-static/. pages/storybook/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Generate Index
        run: python tools/generate_index.py pages

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "pages"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
