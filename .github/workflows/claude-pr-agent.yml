name: Claude PR Agent

on:
  issue_comment:
    types: [created]
  pull_request_review:
    types: [submitted]

jobs:
  respond-to-comment:
    # Run when @claude is mentioned in a comment on a PR that has the 'claude' label.
    # The 'claude' label is applied by Claude when it creates or takes ownership of a PR.
    if: |
      !endsWith(github.actor, '[bot]') &&
      github.event_name == 'issue_comment' &&
      github.event.issue.pull_request != null &&
      github.event.issue.state != 'closed' &&
      contains(github.event.comment.body, '@claude') &&
      contains(github.event.issue.labels.*.name, 'claude')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Install RTK
        run: |
          curl -fsSL https://raw.githubusercontent.com/rtk-ai/rtk/refs/heads/master/install.sh | sh
          echo "$HOME/.rtk/bin" >> $GITHUB_PATH
          mkdir -p /home/runner/.claude/
          rtk init -g --auto-patch
      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          trigger_phrase: "@claude"
          claude_args: |
            --allowed-tools Bash,Edit,Read
            --system-prompt "Use RTK-compressed output for all terminal commands."
            --dangerously-skip-permissions
          show_full_output: "true"
          prompt: |
            A user has mentioned @claude in a comment on pull request #${{ github.event.issue.number }}
            wheret the Claude label is present.

            The comment was:
            ${{ github.event.comment.body }}

            Read the PR, the code, and any relevant context, then post a helpful comment
            responding to the user's question or request. You can also make code changes
            if needed — this PR has the 'claude' label, so you have permission to edit files.
            If you make code changes, be sure to run the full test suite to verify nothing is broken
            (backend: `gz_test`, web: `gz_test_web`, common: `gz_test_common`).

            Post a summary of your token usage and cost to the github step summary.

      - name: Discover missed optimizations
        run: rtk discover >> $GITHUB_STEP_SUMMARY

      - name: Show token savings
        run: rtk gain >> $GITHUB_STEP_SUMMARY

  decline-non-claude-pr:
    # When @claude is mentioned on a PR without the 'claude' label, respond to the
    # comment without making code changes — Claude can answer questions but must not
    # modify files.
    if: |
      !endsWith(github.actor, '[bot]') &&
      github.event_name == 'issue_comment' &&
      github.event.issue.pull_request != null &&
      contains(github.event.comment.body, '@claude') &&
      !contains(github.event.issue.labels.*.name, 'claude')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Install RTK
        run: |
          curl -fsSL https://raw.githubusercontent.com/rtk-ai/rtk/refs/heads/master/install.sh | sh
          echo "$HOME/.rtk/bin" >> $GITHUB_PATH
          mkdir -p /home/runner/.claude/
          rtk init -g --auto-patch
      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          claude_args: |
            --allowed-tools Bash,Edit,Read
            --system-prompt "Use RTK-compressed output for all terminal commands."
            --dangerously-skip-permissions
          show_full_output: "true"
          prompt: |
            A user has mentioned @claude in a comment on pull request #${{ github.event.issue.number }}.

            The comment was:
            ${{ github.event.comment.body }}

            Read the PR, the code, and any relevant context, then post a helpful comment
            responding to the user's question or request. You MUST NOT modify, create, or
            delete any files — this PR does not have the 'claude' label. If their request
            requires code changes, let them know they can add the 'claude' label to this
            PR to give you edit access, or open a new issue labeled 'claude' for you to
            handle in a fresh PR.

            Post a clear, concise response. If you don't know the answer, say so — do not attempt
            to guess or fabricate information.

            Post a summary of your token usage and cost to the github step summary.

      - name: Discover missed optimizations
        run: rtk discover >> $GITHUB_STEP_SUMMARY

      - name: Show token savings
        run: rtk gain >> $GITHUB_STEP_SUMMARY

  address-review-changes:
    # Run when a reviewer requests changes on a PR with the 'claude' label.
    if: |
      !endsWith(github.actor, '[bot]') &&
      github.event_name == 'pull_request_review' &&
      github.event.review.state == 'changes_requested' &&
      github.event.pull_request.state != 'closed' &&
      contains(github.event.pull_request.labels.*.name, 'claude')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - name: Install RTK
        run: |
          curl -fsSL https://raw.githubusercontent.com/rtk-ai/rtk/refs/heads/master/install.sh | sh
          echo "$HOME/.rtk/bin" >> $GITHUB_PATH
          mkdir -p /home/runner/.claude/
          rtk init -g --auto-patch
      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          claude_args: |
            --allowed-tools Bash,Edit,Read
            --system-prompt "Use RTK-compressed output for all terminal commands."
            --dangerously-skip-permissions
          show_full_output: "true"

          prompt: |
            A reviewer has requested changes on pull request #${{ github.event.pull_request.number }}.

            Reviewer: @${{ github.event.review.user.login }}
            Review summary:
            ${{ github.event.review.body }}

            There may also be inline comments attached to the review. Fetch them with:
              gh pr view ${{ github.event.pull_request.number }} --json reviews,reviewThreads

            Please:
            1. Fetch all review feedback (summary above + inline comments via the gh CLI).
            2. Read the current code and understand what each piece of feedback is asking for.
            3. Make the necessary code changes to address every concern raised.
            4. Run the full test suite to verify nothing is broken (backend: `pytest`, web: `cd web && npm test`).
            5. Commit your changes with a message like "Address review feedback from @${{ github.event.review.user.login }}".
            6. Push the changes to this PR branch.
            7. Post a comment on the PR summarising what you changed and how each piece of feedback was addressed.
            8. Post token your token usage and cost summary to the github step summary.

      - name: Discover missed optimizations
        run: rtk discover >> $GITHUB_STEP_SUMMARY

      - name: Show token savings
        run: rtk gain >> $GITHUB_STEP_SUMMARY
