name: Claude PR Agent

on:
  issue_comment:
    types: [created]
  pull_request_review:
    types: [submitted]

jobs:
  respond-to-comment:
    # Run when a PR comment mentions @claude AND the PR was created by Claude
    if: |
      !endsWith(github.actor, '[bot]') &&
      (
        (
          contains(github.event.comment.body, '@claude') &&
          (
            github.event_name == 'pull_request_review_comment' ||
            (github.event_name == 'issue_comment' && github.event.issue.pull_request)
          ) &&
          endsWith(github.event.issue.user.login, '[bot]')
        ) ||
        (
          github.event_name == 'pull_request_review' &&
          github.event.review.state == 'changes_requested' &&
          endsWith(github.event.pull_request.user.login, '[bot]')
        )
      )
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          trigger_phrase: "@claude"
          claude_args: "--dangerously-skip-permissions"
          show_full_output: "true"

  decline-non-claude-pr:
    # When @claude is mentioned on a PR Claude did NOT create, respond to the comment
    # without making code changes — Claude can answer questions but must not modify files.
    if: |
      !endsWith(github.actor, '[bot]') &&
      github.event_name == 'issue_comment' &&
      github.event.issue.pull_request != null &&
      contains(github.event.comment.body, '@claude') &&
      !endsWith(github.event.issue.user.login, '[bot]')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          claude_args: "--dangerously-skip-permissions"
          show_full_output: "true"
          prompt: |
            A user has mentioned @claude in a comment on pull request #${{ github.event.issue.number }},
            but this PR was not opened by you — it was opened by @${{ github.event.issue.user.login }}.

            The comment was:
            ${{ github.event.comment.body }}

            You may read the code and PR context to give a helpful response, but you MUST NOT modify,
            create, or delete any files. Post a comment addressing the user's question or request,
            and explain that you can only make code changes on pull requests you opened yourself.
            If their request requires code changes, suggest they ask the PR author or open a new
            issue (labelled `claude`) for you to handle.

  address-review-changes:
    # Run when a reviewer requests changes on a PR Claude created
    if: |
      !endsWith(github.actor, '[bot]') &&
      github.event_name == 'pull_request_review' &&
      github.event.review.state == 'changes_requested' &&
      endsWith(github.event.pull_request.user.login, '[bot]')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          claude_args: "--dangerously-skip-permissions"
          show_full_output: "true"
          prompt: |
            A reviewer has requested changes on pull request #${{ github.event.pull_request.number }}.

            Reviewer: @${{ github.event.review.user.login }}
            Review summary:
            ${{ github.event.review.body }}

            There may also be inline comments attached to the review. Fetch them with:
              gh pr view ${{ github.event.pull_request.number }} --json reviews,reviewThreads

            Please:
            1. Fetch all review feedback (summary above + inline comments via the gh CLI).
            2. Read the current code and understand what each piece of feedback is asking for.
            3. Make the necessary code changes to address every concern raised.
            4. Run the full test suite to verify nothing is broken (backend: `pytest`, web: `cd web && npm test`).
            5. Commit your changes with a message like "Address review feedback from @${{ github.event.review.user.login }}".
            6. Push the changes to this PR branch.
            7. Post a comment on the PR summarising what you changed and how each piece of feedback was addressed.
