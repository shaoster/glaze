name: Grafana Dashboard Publish

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

jobs:
  publish:
    name: Publish dashboard to Grafana
    if: |
      github.event.workflow_run.conclusion == 'success' &&
      !endsWith(github.actor, '[bot]')
    runs-on: ubuntu-latest
    environment: glaze-grafana
    concurrency:
      group: grafana-dashboard-publish
      cancel-in-progress: false
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 2
      - name: Check whether the dashboard changed
        id: changes
        shell: bash
        run: |
          set -euo pipefail
          changed="$(git show --name-only --format='' HEAD)"
          if grep -q '^tools/grafana_dashboard.py$' <<<"$changed"; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Publish dashboard config
        if: steps.changes.outputs.changed == 'true'
        env:
          GRAFANA_SERVICE_ACCOUNT_TOKEN: ${{ secrets.GRAFANA_SERVICE_ACCOUNT_TOKEN }}
        run: source env.sh && rtk bazel run //tools:grafana_dashboard -- publish
