name: Grafana Dashboard Validation

on:
  pull_request:
    paths:
      - "grafana/dashboards/**"
      - "tools/grafana_dashboard.py"
      - ".github/workflows/grafana-dashboard.yml"
      - ".github/workflows/grafana-dashboard-publish.yml"

jobs:
  validate:
    name: Validate dashboard config
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate Grafana dashboard config
        run: python tools/grafana_dashboard.py validate grafana/dashboards/glaze-app-summary.yaml
