name: Cluster Setup

on:
  push:
    branches: [main]
    paths:
      - "infra/**"
      - "tools/cluster_setup.sh"
      - "tools/patch_system_probes.sh"
  workflow_dispatch:

jobs:
  setup:
    name: Converge cluster infrastructure
    runs-on: ubuntu-latest
    environment: glaze-droplet
    concurrency:
      group: cluster-setup
      cancel-in-progress: false
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5

      - name: Connect to Tailscale
        uses: tailscale/github-action@6cae46e2d796f265265cfcf628b72a32b4d7cade  # v3
        with:
          authkey: ${{ secrets.TAILSCALE_AUTH_KEY }}
          tags: tag:ci

      - name: Ensure cluster
        env:
          DEPLOY_HOST: ${{ vars.DEPLOY_HOST_TAILSCALE }}
          INFISICAL_CLIENT_ID: ${{ secrets.INFISICAL_CLIENT_ID }}
          INFISICAL_CLIENT_SECRET: ${{ secrets.INFISICAL_CLIENT_SECRET }}
        run: tools/ensure_cluster.sh "${DEPLOY_HOST}"
