name: CI

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - ".gitignore"
      - ".gitattributes"
      - ".gitmodules"
      - ".mailmap"
      - ".editorconfig"
      - ".vscode/**"
      - ".idea/**"
      - "LICENSE"
      - "LICENSE.*"
      - "setup-*.sh"
      - "nginx/**"
      - "chart/**"
      - "infra/**"
      - ".agents/**"
  pull_request:
    paths-ignore:
      - "**/*.md"
      - ".gitignore"
      - ".gitattributes"
      - ".gitmodules"
      - ".mailmap"
      - ".editorconfig"
      - ".vscode/**"
      - ".idea/**"
      - "LICENSE"
      - "LICENSE.*"
      - "setup-*.sh"
      - "nginx/**"
      - "chart/**"
      - "infra/**"
      - ".agents/**"

jobs:
  preflight:
    name: Preflight
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    outputs:
      fingerprint: ${{ steps.fingerprint.outputs.value }}
      artifact_key: ${{ steps.fingerprint.outputs.artifact_key }}
      deps_key: ${{ steps.fingerprint.outputs.deps_key }}
      skip_main: ${{ steps.lookup.outputs.skip_main }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - id: fingerprint
        name: Compute CI fingerprint
        shell: bash
        run: |
          tree="$(git rev-parse HEAD^{tree})"
          ci="$(sha256sum .github/workflows/ci.yml | cut -d' ' -f1)"
          bazel="$(sha256sum MODULE.bazel .bazelversion | sha256sum | cut -d' ' -f1)"
          py="$(sha256sum pyproject.toml uv.lock | sha256sum | cut -d' ' -f1)"
          node="$(sha256sum web/pnpm-lock.yaml | cut -d' ' -f1)"
          value="${tree}-${ci}-${bazel}-${py}-${node}"
          deps_value="${bazel}-${py}-${node}"
          artifact_key="$(printf '%s' "$value" | sha256sum | cut -d' ' -f1)"
          deps_key="$(printf '%s' "$deps_value" | sha256sum | cut -d' ' -f1)"
          echo "value=$value" >> "$GITHUB_OUTPUT"
          echo "artifact_key=$artifact_key" >> "$GITHUB_OUTPUT"
          echo "deps_key=$deps_key" >> "$GITHUB_OUTPUT"

      - id: lookup
        name: Check for prior successful PR validation
        uses: actions/github-script@v8
        env:
          ARTIFACT_KEY: ${{ steps.fingerprint.outputs.artifact_key }}
        with:
          script: |
            if (context.eventName !== 'push' || context.ref !== 'refs/heads/main') {
              core.setOutput('skip_main', 'false');
              return;
            }
            const artifactName = `ci-fingerprint-${process.env.ARTIFACT_KEY}`;
            const artifacts = await github.paginate(
              github.rest.actions.listArtifactsForRepo,
              { owner: context.repo.owner, repo: context.repo.repo, per_page: 100 }
            );
            const match = artifacts.find(
              artifact => artifact.name === artifactName && !artifact.expired
            );
            if (match) {
              core.notice(`skip_main: fingerprint already validated by a prior PR run — skipping lint and coverage on main.`);
            }
            core.setOutput('skip_main', match ? 'true' : 'false');

      - name: Security Audit (No Secrets in CI)
        shell: bash
        run: |
          # [SECURITY MANDATE] Static analysis of this workflow file.
          # CI MUST NEVER have access to production secrets. 
          
          # Whitelist of secrets allowed in CI.
          ALLOWED="BAZEL_REMOTE_API_KEY GITHUB_TOKEN"
          
          # Extract secret names only (e.g. BAZEL_REMOTE_API_KEY)
          secrets=$(grep -oE 'secrets\.[A-Z0-9_]+' .github/workflows/ci.yml | cut -d. -f2 | sort -u)
          
          for s in $secrets; do
            if [[ ! " $ALLOWED " =~ " $s " ]]; then
              echo "🚨 SECURITY VIOLATION: Unauthorized secret usage detected in ci.yml: secrets.$s" >&2
              echo "Only the following secrets are allowed in CI: $ALLOWED" >&2
              echo "Real production secrets MUST be restricted to cd.yml." >&2
              exit 1
            fi
          done
          echo "✅ CI Security Audit passed. No unauthorized secrets detected."

  lint:
    name: Lint
    needs: preflight
    if: ${{ github.event_name == 'pull_request' || needs.preflight.outputs.skip_main != 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup-bazel-ci
        with:
          cache-key-prefix: lint
          deps-key: ${{ needs.preflight.outputs.deps_key }}
          buildbuddy-api-key: ${{ secrets.BAZEL_REMOTE_API_KEY }}
      - name: Run Lint
        shell: bash
        run: |
          source env.sh
          gz_lint
      - if: failure()
        uses: ./.github/actions/collect-failure-diagnostics

  coverage:
    name: Coverage & Test
    needs: preflight
    if: ${{ github.event_name == 'pull_request' || needs.preflight.outputs.skip_main != 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup-bazel-ci
        with:
          cache-key-prefix: coverage
          deps-key: ${{ needs.preflight.outputs.deps_key }}
          buildbuddy-api-key: ${{ secrets.BAZEL_REMOTE_API_KEY }}
      - name: Run Coverage & Test
        shell: bash
        run: |
          source env.sh
          gz_test --coverage
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: bazel-out/_coverage/_coverage_report.dat
          flags: code
          fail_ci_if_error: false
      - if: failure()
        uses: ./.github/actions/collect-failure-diagnostics

  image:
    name: Build & smoke-test OCI image
    needs: preflight
    # No skip_main guard — always run on main so the image is always built and
    # pushed. lint and coverage still skip when skip_main=true. Keeping the
    # build and push in one job avoids the job-dependency skip-propagation
    # problem that bit us twice when push lived in a separate job.
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.sha }}

      - uses: ./.github/actions/setup-bazel-ci
        with:
          cache-key-prefix: image
          deps-key: ${{ needs.preflight.outputs.deps_key }}
          buildbuddy-api-key: ${{ secrets.BAZEL_REMOTE_API_KEY }}

      - name: Build OCI image and load into docker
        run: bazel run --config=ci --stamp //:load

      - name: Lint and validate Helm chart
        run: |
          helm lint chart/glaze/ \
            --set image.tag=ci \
            --set appConfig.allowedHost=localhost \
            --set appConfig.appOrigin=http://localhost \
            --set appConfig.inviteLinkBaseUrl=http://localhost/accept-invite \
            --set appConfig.googleOauthClientId=ci \
            --set appConfig.cloudinaryCloudName=ci \
            --set appConfig.cloudinaryUploadFolder=ci \
            --set appConfig.cloudinaryUploadPreset=ci \
            --set appConfig.cloudinaryPublicUploadFolder=ci

          # Render full manifest and verify no empty required env vars leak through
          helm template glaze chart/glaze/ \
            --set image.tag=ci \
            --set appConfig.allowedHost=localhost \
            --set appConfig.appOrigin=http://localhost \
            --set appConfig.inviteLinkBaseUrl=http://localhost/accept-invite \
            --set appConfig.googleOauthClientId=ci \
            --set appConfig.cloudinaryCloudName=ci \
            --set appConfig.cloudinaryUploadFolder=ci \
            --set appConfig.cloudinaryUploadPreset=ci \
            --set appConfig.cloudinaryPublicUploadFolder=ci \
            | grep -E '^\s+[A-Z_]+:\s*""' && {
              echo "Empty required env vars found in rendered chart" >&2
              exit 1
            } || true

      - if: failure()
        uses: ./.github/actions/collect-failure-diagnostics

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push OCI image
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          bazel run --config=ci --stamp //:push -- \
            --tag latest \
            --tag ${{ github.sha }}
          bazel run --config=ci --stamp //:push_worker -- \
            --tag latest \
            --tag ${{ github.sha }}

  record-fingerprint:
    name: Record successful fingerprint
    needs: [preflight, lint, coverage, image]
    if: ${{ github.event_name == 'pull_request' && needs.lint.result == 'success' && needs.coverage.result == 'success' && needs.image.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Write fingerprint marker
        shell: bash
        run: |
          printf '%s\n' '${{ needs.preflight.outputs.fingerprint }}' > ci-fingerprint.txt

      - uses: actions/upload-artifact@v4
        with:
          name: ci-fingerprint-${{ needs.preflight.outputs.artifact_key }}
          path: ci-fingerprint.txt
          retention-days: 30
