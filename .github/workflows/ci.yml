name: CI

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - ".gitignore"
      - ".gitattributes"
      - ".gitmodules"
      - ".mailmap"
      - ".editorconfig"
      - ".vscode/**"
      - ".idea/**"
      - "LICENSE"
      - "LICENSE.*"
      - "deploy.sh"
      - "setup-*.sh"
      - "nginx/**"
  pull_request:
    paths-ignore:
      - "**/*.md"
      - ".gitignore"
      - ".gitattributes"
      - ".gitmodules"
      - ".mailmap"
      - ".editorconfig"
      - ".vscode/**"
      - ".idea/**"
      - "LICENSE"
      - "LICENSE.*"
      - "deploy.sh"
      - "setup-*.sh"
      - "nginx/**"

jobs:
  preflight:
    name: Preflight
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    outputs:
      fingerprint: ${{ steps.fingerprint.outputs.value }}
      artifact_key: ${{ steps.fingerprint.outputs.artifact_key }}
      deps_key: ${{ steps.fingerprint.outputs.deps_key }}
      skip_main: ${{ steps.lookup.outputs.skip_main }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - id: fingerprint
        name: Compute CI fingerprint
        shell: bash
        run: |
          tree="$(git rev-parse HEAD^{tree})"
          ci="$(sha256sum .github/workflows/ci.yml | cut -d' ' -f1)"
          bazel="$(sha256sum MODULE.bazel .bazelversion | sha256sum | cut -d' ' -f1)"
          py="$(sha256sum pyproject.toml uv.lock | sha256sum | cut -d' ' -f1)"
          node="$(sha256sum web/pnpm-lock.yaml | cut -d' ' -f1)"
          value="${tree}-${ci}-${bazel}-${py}-${node}"
          deps_value="${bazel}-${py}-${node}"
          artifact_key="$(printf '%s' "$value" | sha256sum | cut -d' ' -f1)"
          deps_key="$(printf '%s' "$deps_value" | sha256sum | cut -d' ' -f1)"
          echo "value=$value" >> "$GITHUB_OUTPUT"
          echo "artifact_key=$artifact_key" >> "$GITHUB_OUTPUT"
          echo "deps_key=$deps_key" >> "$GITHUB_OUTPUT"

      - id: lookup
        name: Check for prior successful PR validation
        uses: actions/github-script@v8
        env:
          ARTIFACT_KEY: ${{ steps.fingerprint.outputs.artifact_key }}
        with:
          script: |
            if (context.eventName !== 'push' || context.ref !== 'refs/heads/main') {
              core.setOutput('skip_main', 'false');
              return;
            }
            const artifactName = `ci-fingerprint-${process.env.ARTIFACT_KEY}`;
            const artifacts = await github.paginate(
              github.rest.actions.listArtifactsForRepo,
              { owner: context.repo.owner, repo: context.repo.repo, per_page: 100 }
            );
            const match = artifacts.find(
              artifact => artifact.name === artifactName && !artifact.expired
            );
            core.setOutput('skip_main', match ? 'true' : 'false');

  lint:
    name: Lint
    needs: preflight
    if: ${{ github.event_name == 'pull_request' || needs.preflight.outputs.skip_main != 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup-bazel-ci
        with:
          cache-key-prefix: lint
          deps-key: ${{ needs.preflight.outputs.deps_key }}
          buildbuddy-api-key: ${{ secrets.BAZEL_REMOTE_API_KEY }}
      - name: Run Lint
        shell: bash
        run: |
          source env.sh
          gz_lint
      - if: failure()
        uses: ./.github/actions/collect-failure-diagnostics

  coverage:
    name: Coverage & Test
    needs: preflight
    if: ${{ github.event_name == 'pull_request' || needs.preflight.outputs.skip_main != 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup-bazel-ci
        with:
          cache-key-prefix: coverage
          deps-key: ${{ needs.preflight.outputs.deps_key }}
          buildbuddy-api-key: ${{ secrets.BAZEL_REMOTE_API_KEY }}
      - name: Run Coverage & Test
        shell: bash
        run: |
          source env.sh
          gz_test --coverage
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: bazel-out/_coverage/_coverage_report.dat
          flags: code
          fail_ci_if_error: false
      - if: failure()
        uses: ./.github/actions/collect-failure-diagnostics

  image:
    name: Build & smoke-test OCI image
    needs: preflight
    if: ${{ github.event_name == 'pull_request' || needs.preflight.outputs.skip_main != 'true' }}
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.sha }}

      - uses: ./.github/actions/setup-bazel-ci
        with:
          cache-key-prefix: image
          deps-key: ${{ needs.preflight.outputs.deps_key }}
          buildbuddy-api-key: ${{ secrets.BAZEL_REMOTE_API_KEY }}

      - name: Write Vite env file
        run: printf 'VITE_GOOGLE_CLIENT_ID=%s\n' '${{ secrets.VITE_GOOGLE_CLIENT_ID }}' > web/.env.local

      - name: Build OCI image and load into docker
        run: bazel run --config=ci --stamp //:load

      - name: Pre-pull sidecar images
        run: |
          # Pull third-party images (postgres, otelcol, etc.) before starting
          # the timed --wait block so image download doesn't eat into the
          # healthcheck timeout budget.
          docker compose pull --ignore-buildable

      - name: Smoke test via docker compose
        run: |
          set -euo pipefail
          export POSTGRES_PASSWORD=ci
          export SECRET_KEY=$(openssl rand -hex 32)
          export ALLOWED_HOST=localhost
          export APP_ORIGIN=http://localhost:8000
          # `--wait` blocks until every service with a healthcheck reports
          # healthy. The web service's healthcheck (defined in
          # docker-compose.yml) is the pass criterion.
          # Timeout is 300s: migrate + load_public_library (249 records) +
          # collectstatic + gunicorn startup can exceed 120s on a cold runner.
          docker compose up -d --wait --wait-timeout 300
          docker compose logs web | tail -50

      - if: failure()
        uses: ./.github/actions/collect-failure-diagnostics

      - name: Tear down compose
        if: always()
        run: docker compose down -v --remove-orphans || true

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push OCI image
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          bazel run --config=ci --stamp //:push -- \
            --tag latest \
            --tag ${{ github.sha }}

  record-fingerprint:
    name: Record successful fingerprint
    needs: [preflight, lint, coverage, image]
    if: ${{ github.event_name == 'pull_request' && needs.lint.result == 'success' && needs.coverage.result == 'success' && needs.image.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Write fingerprint marker
        shell: bash
        run: |
          printf '%s\n' '${{ needs.preflight.outputs.fingerprint }}' > ci-fingerprint.txt

      - uses: actions/upload-artifact@v4
        with:
          name: ci-fingerprint-${{ needs.preflight.outputs.artifact_key }}
          path: ci-fingerprint.txt
          retention-days: 30
