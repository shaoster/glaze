name: CI

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - ".gitignore"
      - ".gitattributes"
      - ".gitmodules"
      - ".mailmap"
      - ".editorconfig"
      - ".vscode/**"
      - ".idea/**"
      - "LICENSE"
      - "LICENSE.*"
      - "setup-*.sh"
      - "nginx/**"
      - "chart/**"
      - "infra/**"
      - ".agents/**"
  pull_request:
    paths-ignore:
      - "**/*.md"
      - ".gitignore"
      - ".gitattributes"
      - ".gitmodules"
      - ".mailmap"
      - ".editorconfig"
      - ".vscode/**"
      - ".idea/**"
      - "LICENSE"
      - "LICENSE.*"
      - "setup-*.sh"
      - "nginx/**"
      - "chart/**"
      - "infra/**"
      - ".agents/**"

jobs:
  preflight:
    name: Preflight
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    outputs:
      fingerprint: ${{ steps.fingerprint.outputs.value }}
      artifact_key: ${{ steps.fingerprint.outputs.artifact_key }}
      deps_key: ${{ steps.fingerprint.outputs.deps_key }}
      skip_main: ${{ steps.lookup.outputs.skip_main }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 1
          lfs: true

      - id: fingerprint
        name: Compute CI fingerprint
        shell: bash
        run: |
          tree="$(git rev-parse HEAD^{tree})"
          ci="$(sha256sum .github/workflows/ci.yml | cut -d' ' -f1)"
          bazel="$(sha256sum MODULE.bazel .bazelversion | sha256sum | cut -d' ' -f1)"
          py="$(sha256sum pyproject.toml uv.lock | sha256sum | cut -d' ' -f1)"
          node="$(sha256sum web/pnpm-lock.yaml | cut -d' ' -f1)"
          value="${tree}-${ci}-${bazel}-${py}-${node}"
          deps_value="${bazel}-${py}-${node}"
          artifact_key="$(printf '%s' "$value" | sha256sum | cut -d' ' -f1)"
          deps_key="$(printf '%s' "$deps_value" | sha256sum | cut -d' ' -f1)"
          echo "value=$value" >> "$GITHUB_OUTPUT"
          echo "artifact_key=$artifact_key" >> "$GITHUB_OUTPUT"
          echo "deps_key=$deps_key" >> "$GITHUB_OUTPUT"

      - id: lookup
        name: Check for prior successful PR validation
        uses: actions/github-script@v8
        env:
          ARTIFACT_KEY: ${{ steps.fingerprint.outputs.artifact_key }}
        with:
          script: |
            if (context.eventName !== 'push' || context.ref !== 'refs/heads/main') {
              core.setOutput('skip_main', 'false');
              return;
            }
            const artifactName = `ci-fingerprint-${process.env.ARTIFACT_KEY}`;
            const artifacts = await github.paginate(
              github.rest.actions.listArtifactsForRepo,
              { owner: context.repo.owner, repo: context.repo.repo, per_page: 100 }
            );
            const match = artifacts.find(
              artifact => artifact.name === artifactName && !artifact.expired
            );
            if (match) {
              core.notice(`skip_main: fingerprint already validated by a prior PR run — skipping lint and coverage on main.`);
            }
            core.setOutput('skip_main', match ? 'true' : 'false');

      - name: Security Audit (No Secrets in CI)
        shell: bash
        run: |
          # [SECURITY MANDATE] Static analysis of this workflow file.
          # CI MUST NEVER have access to production secrets. 
          
          # Whitelist of secrets allowed in CI.
          ALLOWED="BAZEL_REMOTE_API_KEY GITHUB_TOKEN"
          
          # Extract secret names only (e.g. BAZEL_REMOTE_API_KEY)
          secrets=$(grep -oE 'secrets\.[A-Z0-9_]+' .github/workflows/ci.yml | cut -d. -f2 | sort -u)
          
          for s in $secrets; do
            if [[ ! " $ALLOWED " =~ " $s " ]]; then
              echo "🚨 SECURITY VIOLATION: Unauthorized secret usage detected in ci.yml: secrets.$s" >&2
              echo "Only the following secrets are allowed in CI: $ALLOWED" >&2
              echo "Real production secrets MUST be restricted to cd.yml." >&2
              exit 1
            fi
          done
          echo "✅ CI Security Audit passed. No unauthorized secrets detected."

  lint:
    name: Lint
    needs: preflight
    if: ${{ github.event_name == 'pull_request' || needs.preflight.outputs.skip_main != 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          lfs: true
      - uses: ./.github/actions/setup-bazel-ci
        with:
          cache-key-prefix: lint
          deps-key: ${{ needs.preflight.outputs.deps_key }}
          buildbuddy-api-key: ${{ secrets.BAZEL_REMOTE_API_KEY }}
      - name: Run Lint
        shell: bash
        run: |
          source env.sh
          gz_lint
      - if: failure()
        uses: ./.github/actions/collect-failure-diagnostics

  coverage:
    name: Coverage & Test
    needs: preflight
    if: ${{ github.event_name == 'pull_request' || needs.preflight.outputs.skip_main != 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          lfs: true
      - uses: ./.github/actions/setup-bazel-ci
        with:
          cache-key-prefix: coverage
          deps-key: ${{ needs.preflight.outputs.deps_key }}
          buildbuddy-api-key: ${{ secrets.BAZEL_REMOTE_API_KEY }}
      - name: Run Coverage & Test
        shell: bash
        run: |
          source env.sh
          gz_test --coverage
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: bazel-out/_coverage/_coverage_report.dat
          flags: code
          fail_ci_if_error: false
      - if: failure()
        uses: ./.github/actions/collect-failure-diagnostics

  dev-smoke:
    name: Dev bootstrap smoke (env.sh → gz_start → login → gz_stop)
    needs: preflight
    if: ${{ github.event_name == 'pull_request' || needs.preflight.outputs.skip_main != 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          lfs: true
      - uses: ./.github/actions/setup-bazel-ci
        with:
          cache-key-prefix: dev-smoke
          deps-key: ${{ needs.preflight.outputs.deps_key }}
          buildbuddy-api-key: ${{ secrets.BAZEL_REMOTE_API_KEY }}

      # Verifies the developer bootstrap end to end: the documented
      # `source env.sh` → `gz_start` flow must bring up the dev stack on a
      # clean checkout, a user must be able to sign in via the dev mock-IdP
      # login flow, the pieces API must return the seeded sample data, and
      # `gz_stop` must tear the stack back down. The whole sequence runs in one
      # shell because gz_start registers an EXIT trap that stops the servers
      # when the step's shell exits (which also cleans up on failure).
      - name: Bootstrap, log in via mock IdP, verify pieces, stop
        shell: bash
        run: |
          # No `set -u`: env.sh / env-agent.sh are not nounset-safe (they read
          # $_GLAZE_AGENT_ENV_LOADED before it is set). -e and pipefail are
          # already applied by the Actions bash wrapper; keep them explicit.
          set -eo pipefail
          source env.sh

          fail() {
            echo "::error::dev-smoke: $1" >&2
            echo "--- backend log ---" >&2
            cat .dev-logs/backend.log 2>/dev/null >&2 || true
            exit 1
          }

          echo "::group::gz_start"
          gz_start || fail "gz_start failed to bring up the dev stack"
          echo "::endgroup::"

          BASE="http://localhost:$(cat .dev-pids/backend.port)"
          JAR="$(mktemp)"

          # Dev login flow: POST the mock-IdP authorize endpoint (CSRF-exempt),
          # capture the relative redirect to complete/, then GET it to land the
          # session cookie. A single `curl -L` is unreliable here because cookies
          # written at the intermediate hop are not flushed when the final hop
          # returns a redirect — so we do the two steps explicitly.
          echo "::group::mock-IdP login"
          LOCATION=$(curl -fsS --retry 5 --retry-connrefused -c "$JAR" -b "$JAR" -D - -X POST \
            --data "redirect_uri=/api/auth/mock-idp/complete/&state=ci&login_hint=dev@localhost" \
            "${BASE}/api/auth/mock-idp/authorize/" \
            | grep -i '^location:' | sed 's/[Ll]ocation: //' | tr -d '\r\n')
          [ -n "$LOCATION" ] || fail "mock-IdP authorize did not return a redirect (is DEV_BOOTSTRAP_ENABLED set?)"
          curl -fsS -c "$JAR" -b "$JAR" "${BASE}${LOCATION}" -o /dev/null
          echo "::endgroup::"

          # Confirm we have an authenticated session.
          curl -fsS -b "$JAR" "${BASE}/api/auth/me/" \
            | python3 -c 'import json,sys; d=json.load(sys.stdin); assert d.get("user"), "no authenticated user"; print("authenticated:", d["user"]["openid_subject"][:16])' \
            || fail "session was not authenticated after mock-IdP login"

          # The freshly bootstrapped dev user is seeded with sample pieces.
          COUNT=$(curl -fsS -b "$JAR" "${BASE}/api/pieces/" \
            | python3 -c 'import json,sys; print(json.load(sys.stdin)["count"])') \
            || fail "could not read /api/pieces/"
          echo "pieces count: $COUNT"
          [ "$COUNT" -gt 0 ] || fail "expected seeded pieces after login, got $COUNT"

          echo "::group::gz_stop"
          gz_stop
          echo "::endgroup::"

          # gz_stop must actually stop both servers. Match only the affirmative
          # running state — a plain "running" grep also matches "not running".
          if gz_status | grep -qE ': running'; then
            gz_status >&2
            fail "gz_stop did not stop all servers"
          fi
          echo "dev-smoke: passed (pieces=$COUNT)"

      - if: failure()
        uses: ./.github/actions/collect-failure-diagnostics

  compose-smoke:
    name: Docker Compose smoke test
    needs: preflight
    if: ${{ github.event_name == 'pull_request' || needs.preflight.outputs.skip_main != 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          lfs: true

      - name: Configure test environment
        run: |
          cat > infra/custom/.env << 'EOF'
          POSTGRES_PASSWORD=test_postgres_password
          SECRET_KEY=test_secret_key_django_placeholder
          DOMAIN=glaze.local
          ALLOWED_HOSTS=glaze.local,localhost,127.0.0.1
          PRODUCTION=True
          GLAZE_DEV_BOOTSTRAP=force
          APP_ORIGIN=https://glaze.local
          EOF

      - name: Generate self-signed SSL certificates for Nginx
        run: |
          docker compose -f infra/custom/docker-compose.yml -f infra/custom/docker-compose.smoke.yml run --rm --entrypoint "/bin/sh -c" certbot \
            "mkdir -p /etc/letsencrypt/live/glaze.local && openssl req -x509 -nodes -newkey rsa:2048 -days 1 -keyout /etc/letsencrypt/live/glaze.local/privkey.pem -out /etc/letsencrypt/live/glaze.local/fullchain.pem -subj '/CN=glaze.local'"

      - name: Start Docker Compose stack and wait for health
        run: |
          docker compose -f infra/custom/docker-compose.yml -f infra/custom/docker-compose.smoke.yml up --build -d --wait nginx certbot

      - name: Verify application readiness and data seeding
        shell: bash
        run: |
          # 1. Verify HTTP 301 redirect from HTTP to HTTPS
          curl -I -s -H "Host: glaze.local" http://localhost/ | grep -i "Location: https://glaze.local/"

          # 2. Verify readiness endpoint through HTTPS proxy
          curl -k -fsS --resolve glaze.local:443:127.0.0.1 https://glaze.local/api/health/ready/ | python3 -m json.tool

          # 3. Perform mock-IdP login through Nginx HTTPS proxy
          JAR="$(mktemp)"
          
          # POST authorize -> capture the relative redirect
          LOCATION=$(curl -k -fsS --resolve glaze.local:443:127.0.0.1 -c "$JAR" -b "$JAR" -D - -X POST \
            --data "redirect_uri=/api/auth/mock-idp/complete/&state=ci&login_hint=compose-smoke@localhost" \
            "https://glaze.local/api/auth/mock-idp/authorize/" \
            | grep -i '^location:' | sed 's/[Ll]ocation: //' | tr -d '\r\n')
            
          [ -n "$LOCATION" ] || { echo "Error: Mock authorize did not return location header" >&2; exit 1; }
          
          # GET complete/ to set the cookie
          curl -k -fsS --resolve glaze.local:443:127.0.0.1 -c "$JAR" -b "$JAR" "https://glaze.local${LOCATION}" -o /dev/null

          # Confirm we are logged in
          curl -k -fsS --resolve glaze.local:443:127.0.0.1 -b "$JAR" "https://glaze.local/api/auth/me/" \
            | python3 -c 'import json,sys; d=json.load(sys.stdin); assert d.get("user"), "Not authenticated"; print("Authenticated as:", d["user"]["openid_subject"][:16])'

          # Verify that seeded pieces exist
          COUNT=$(curl -k -fsS --resolve glaze.local:443:127.0.0.1 -b "$JAR" "https://glaze.local/api/pieces/" \
            | python3 -c 'import json,sys; print(json.load(sys.stdin)["count"])')
          echo "Seeded pieces count: $COUNT"
          [ "$COUNT" -gt 0 ] || { echo "Error: Expected seeded pieces, got $COUNT" >&2; exit 1; }

      - name: Dump logs on failure
        if: failure()
        run: |
          docker compose -f infra/custom/docker-compose.yml -f infra/custom/docker-compose.smoke.yml logs

  image:
    name: Build & smoke-test OCI image
    needs: preflight
    # No skip_main guard — always run on main so the image is always built and
    # pushed. lint and coverage still skip when skip_main=true. Keeping the
    # build and push in one job avoids the job-dependency skip-propagation
    # problem that bit us twice when push lived in a separate job.
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v5
        with:
          lfs: true
          # Pin to the exact SHA on main so the image build uses the same
          # commit that lint/coverage validated. Omit on PRs — the default
          # merge-commit ref is fine there and avoids replication-race failures.
          ref: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && github.sha || '' }}

      - uses: ./.github/actions/setup-bazel-ci
        with:
          cache-key-prefix: image
          deps-key: ${{ needs.preflight.outputs.deps_key }}
          buildbuddy-api-key: ${{ secrets.BAZEL_REMOTE_API_KEY }}

      - name: Build OCI image and load into docker
        run: bazel run --config=ci --stamp //:load

      - name: Verify image starts cleanly (django check)
        run: |
          docker run --rm \
            -e SECRET_KEY=ci-check-placeholder \
            ghcr.io/shaoster/glaze:ci \
            python manage.py check

      - name: Lint and validate Helm chart
        run: |
          helm lint chart/glaze/ \
            --set image.tag=ci \
            --set appConfig.allowedHost=localhost \
            --set appConfig.appOrigin=http://localhost \
            --set appConfig.inviteLinkBaseUrl=http://localhost/accept-invite \
            --set appConfig.googleOauthClientId=ci \
            --set appConfig.cloudinaryCloudName=ci \
            --set appConfig.cloudinaryUploadFolder=ci \
            --set appConfig.cloudinaryUploadPreset=ci \
            --set appConfig.cloudinaryPublicUploadFolder=ci

          # Render full manifest and verify no empty required env vars leak through
          helm template glaze chart/glaze/ \
            --set image.tag=ci \
            --set appConfig.allowedHost=localhost \
            --set appConfig.appOrigin=http://localhost \
            --set appConfig.inviteLinkBaseUrl=http://localhost/accept-invite \
            --set appConfig.googleOauthClientId=ci \
            --set appConfig.cloudinaryCloudName=ci \
            --set appConfig.cloudinaryUploadFolder=ci \
            --set appConfig.cloudinaryUploadPreset=ci \
            --set appConfig.cloudinaryPublicUploadFolder=ci \
            | grep -E '^\s+[A-Z_]+:\s*""' && {
              echo "Empty required env vars found in rendered chart" >&2
              exit 1
            } || true

      - if: failure()
        uses: ./.github/actions/collect-failure-diagnostics

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push OCI image
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          bazel run --config=ci --stamp //:push -- \
            --tag latest \
            --tag ${{ github.sha }}
          bazel run --config=ci --stamp //:push_worker -- \
            --tag latest \
            --tag ${{ github.sha }}

  record-fingerprint:
    name: Record successful fingerprint
    needs: [preflight, lint, coverage, dev-smoke, image, compose-smoke]
    if: ${{ github.event_name == 'pull_request' && needs.lint.result == 'success' && needs.coverage.result == 'success' && needs.dev-smoke.result == 'success' && needs.image.result == 'success' && needs.compose-smoke.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Write fingerprint marker
        shell: bash
        run: |
          printf '%s\n' '${{ needs.preflight.outputs.fingerprint }}' > ci-fingerprint.txt

      - uses: actions/upload-artifact@v4
        with:
          name: ci-fingerprint-${{ needs.preflight.outputs.artifact_key }}
          path: ci-fingerprint.txt
          retention-days: 30
