name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - '.gitignore'
      - '.gitattributes'
      - '.gitmodules'
      - '.mailmap'
      - '.editorconfig'
      - '.vscode/**'
      - '.idea/**'
      - 'LICENSE'
      - 'LICENSE.*'
  pull_request:

jobs:
  preflight:
    name: Preflight
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    outputs:
      fingerprint: ${{ steps.fingerprint.outputs.value }}
      artifact_key: ${{ steps.fingerprint.outputs.artifact_key }}
      skip_main: ${{ steps.lookup.outputs.skip_main }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - id: fingerprint
        name: Compute CI fingerprint
        shell: bash
        run: |
          tree="$(git rev-parse HEAD^{tree})"
          ci="$(sha256sum .github/workflows/ci.yml | cut -d' ' -f1)"
          pydev="$(sha256sum requirements-dev.txt | cut -d' ' -f1)"
          py="$(sha256sum requirements.txt | cut -d' ' -f1)"
          node="$(sha256sum web/package-lock.json | cut -d' ' -f1)"
          value="${tree}-${ci}-${pydev}-${py}-${node}"
          artifact_key="$(printf '%s' "$value" | sha256sum | cut -d' ' -f1)"

          echo "value=$value" >> "$GITHUB_OUTPUT"
          echo "artifact_key=$artifact_key" >> "$GITHUB_OUTPUT"

      - id: lookup
        name: Check for prior successful PR validation
        uses: actions/github-script@v8
        env:
          ARTIFACT_KEY: ${{ steps.fingerprint.outputs.artifact_key }}
        with:
          script: |
            if (context.eventName !== 'push' || context.ref !== 'refs/heads/main') {
              core.setOutput('skip_main', 'false');
              return;
            }

            const artifactName = `ci-fingerprint-${process.env.ARTIFACT_KEY}`;
            const artifacts = await github.paginate(
              github.rest.actions.listArtifactsForRepo,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                per_page: 100,
              }
            );

            const match = artifacts.find(
              artifact => artifact.name === artifactName && !artifact.expired
            );

            core.setOutput('skip_main', match ? 'true' : 'false');

  common:
    name: Common (workflow schema)
    needs: preflight
    if: ${{ github.event_name == 'pull_request' || needs.preflight.outputs.skip_main != 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run tests
        run: pytest tests/

  backend:
    name: Backend (pytest + coverage)
    needs: preflight
    if: ${{ github.event_name == 'pull_request' || needs.preflight.outputs.skip_main != 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run tests with coverage
        run: pytest api/ --cov=api --cov-report=lcov:coverage/lcov.info --cov-report=term-missing

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: coverage/lcov.info
          flags: backend
          fail_ci_if_error: false

      - name: Generate OpenAPI schema
        run: python manage.py spectacular --format openapi-json --file openapi.json

      - name: Upload OpenAPI schema
        uses: actions/upload-artifact@v4
        with:
          name: openapi-schema
          path: openapi.json
          retention-days: 1

  python-quality:
    name: Python (ruff + mypy)
    needs: preflight
    if: ${{ github.event_name == 'pull_request' || needs.preflight.outputs.skip_main != 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Lint (ruff) and type-check (mypy) in parallel
        run: |
          ruff check . &
          RUFF_PID=$!
          mypy . &
          MYPY_PID=$!
          wait $RUFF_PID; RUFF_EXIT=$?
          wait $MYPY_PID; MYPY_EXIT=$?
          exit $(( RUFF_EXIT | MYPY_EXIT ))

  web:
    name: Web (test + build + lint)
    needs: [preflight, backend]
    if: ${{ github.event_name == 'pull_request' || needs.preflight.outputs.skip_main != 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install Node dependencies
        working-directory: web
        run: npm ci

      - name: Download OpenAPI schema
        uses: actions/download-artifact@v4
        with:
          name: openapi-schema

      - name: Generate TypeScript types
        working-directory: web
        run: GLAZE_SCHEMA_SOURCE="../openapi.json" npm run generate-types

      - name: Test, build, and lint in parallel
        working-directory: web
        run: |
          npm run test -- --coverage &
          TEST_PID=$!
          npm run build &
          BUILD_PID=$!
          npm run lint &
          LINT_PID=$!
          wait $TEST_PID; TEST_EXIT=$?
          wait $BUILD_PID; BUILD_EXIT=$?
          wait $LINT_PID; LINT_EXIT=$?
          exit $(( TEST_EXIT | BUILD_EXIT | LINT_EXIT ))

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: web/coverage/lcov.info
          flags: frontend
          fail_ci_if_error: false

  record-fingerprint:
    name: Record successful fingerprint
    needs: [preflight, common, backend, python-quality, web]
    if: ${{ github.event_name == 'pull_request' && needs.common.result == 'success' && needs.backend.result == 'success' && needs.python-quality.result == 'success' && needs.web.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Write fingerprint marker
        shell: bash
        run: |
          printf '%s\n' '${{ needs.preflight.outputs.fingerprint }}' > ci-fingerprint.txt

      - uses: actions/upload-artifact@v4
        with:
          name: ci-fingerprint-${{ needs.preflight.outputs.artifact_key }}
          path: ci-fingerprint.txt
          retention-days: 30
