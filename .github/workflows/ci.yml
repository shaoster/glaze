name: CI

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - ".gitignore"
      - ".gitattributes"
      - ".gitmodules"
      - ".mailmap"
      - ".editorconfig"
      - ".vscode/**"
      - ".idea/**"
      - "LICENSE"
      - "LICENSE.*"
      - "docker-compose.yml"
  pull_request:

jobs:
  preflight:
    name: Preflight
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    outputs:
      fingerprint: ${{ steps.fingerprint.outputs.value }}
      artifact_key: ${{ steps.fingerprint.outputs.artifact_key }}
      deps_key: ${{ steps.fingerprint.outputs.deps_key }}
      skip_main: ${{ steps.lookup.outputs.skip_main }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - id: fingerprint
        name: Compute CI fingerprint
        shell: bash
        run: |
          tree="$(git rev-parse HEAD^{tree})"
          ci="$(sha256sum .github/workflows/ci.yml | cut -d' ' -f1)"
          bazel="$(sha256sum MODULE.bazel | cut -d' ' -f1)"
          py="$(sha256sum requirements.txt requirements-dev.txt | sha256sum | cut -d' ' -f1)"
          node="$(sha256sum web/pnpm-lock.yaml | cut -d' ' -f1)"
          value="${tree}-${ci}-${bazel}-${py}-${node}"
          deps_value="${bazel}-${py}-${node}"
          artifact_key="$(printf '%s' "$value" | sha256sum | cut -d' ' -f1)"
          deps_key="$(printf '%s' "$deps_value" | sha256sum | cut -d' ' -f1)"
          echo "value=$value" >> "$GITHUB_OUTPUT"
          echo "artifact_key=$artifact_key" >> "$GITHUB_OUTPUT"
          echo "deps_key=$deps_key" >> "$GITHUB_OUTPUT"

      - id: lookup
        name: Check for prior successful PR validation
        uses: actions/github-script@v8
        env:
          ARTIFACT_KEY: ${{ steps.fingerprint.outputs.artifact_key }}
        with:
          script: |
            if (context.eventName !== 'push' || context.ref !== 'refs/heads/main') {
              core.setOutput('skip_main', 'false');
              return;
            }
            const artifactName = `ci-fingerprint-${process.env.ARTIFACT_KEY}`;
            const artifacts = await github.paginate(
              github.rest.actions.listArtifactsForRepo,
              { owner: context.repo.owner, repo: context.repo.repo, per_page: 100 }
            );
            const match = artifacts.find(
              artifact => artifact.name === artifactName && !artifact.expired
            );
            core.setOutput('skip_main', match ? 'true' : 'false');

  lint:
    name: Lint
    needs: preflight
    if: ${{ github.event_name == 'pull_request' || needs.preflight.outputs.skip_main != 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Cache Bazel Repository
        uses: actions/cache@v4
        with:
          path: ~/.cache/bazel/_bazel_runner/cache/repos/v1
          key: bazel-repo-${{ needs.preflight.outputs.deps_key }}
          restore-keys: bazel-repo-
      - name: Cache Bazel Disk
        uses: actions/cache@v4
        with:
          path: ~/.cache/bazel-disk-cache
          key: bazel-disk-lint-${{ needs.preflight.outputs.deps_key }}-${{ github.run_id }}
          restore-keys: |
            bazel-disk-lint-${{ needs.preflight.outputs.deps_key }}-
            bazel-disk-
      - name: Inject secret into ~/.bazelrc
        run: |
          echo "" >> .bazelrc
          echo "common:ci --remote_header=x-buildbuddy-api-key=${{ secrets.BAZEL_REMOTE_API_KEY }}" >> .bazelrc
      - name: Run Lint
        shell: bash
        run: |
          source env.sh
          gz_lint

  backend-test:
    name: Backend Test
    needs: preflight
    if: ${{ github.event_name == 'pull_request' || needs.preflight.outputs.skip_main != 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Cache Bazel Repository
        uses: actions/cache@v4
        with:
          path: ~/.cache/bazel/_bazel_runner/cache/repos/v1
          key: bazel-repo-${{ needs.preflight.outputs.deps_key }}
          restore-keys: bazel-repo-
      - name: Cache Bazel Disk
        uses: actions/cache@v4
        with:
          path: ~/.cache/bazel-disk-cache
          key: bazel-disk-backend-${{ needs.preflight.outputs.deps_key }}-${{ github.run_id }}
          restore-keys: |
            bazel-disk-backend-${{ needs.preflight.outputs.deps_key }}-
            bazel-disk-
      - name: Inject secret into ~/.bazelrc
        run: |
          echo "" >> .bazelrc
          echo "common:ci --remote_header=x-buildbuddy-api-key=${{ secrets.BAZEL_REMOTE_API_KEY }}" >> .bazelrc
      - name: Run Backend Tests
        shell: bash
        run: |
          source env.sh
          gz_test //api/... --coverage
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: bazel-out/_coverage/_coverage_report.dat
          flags: backend
          fail_ci_if_error: false

  frontend-test:
    name: Frontend Test
    needs: preflight
    if: ${{ github.event_name == 'pull_request' || needs.preflight.outputs.skip_main != 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Cache Bazel Repository
        uses: actions/cache@v4
        with:
          path: ~/.cache/bazel/_bazel_runner/cache/repos/v1
          key: bazel-repo-${{ needs.preflight.outputs.deps_key }}
          restore-keys: bazel-repo-
      - name: Cache Bazel Disk
        uses: actions/cache@v4
        with:
          path: ~/.cache/bazel-disk-cache
          key: bazel-disk-frontend-${{ needs.preflight.outputs.deps_key }}-${{ github.run_id }}
          restore-keys: |
            bazel-disk-frontend-${{ needs.preflight.outputs.deps_key }}-
            bazel-disk-
      - name: Inject secret into ~/.bazelrc
        run: |
          echo "" >> .bazelrc
          echo "common:ci --remote_header=x-buildbuddy-api-key=${{ secrets.BAZEL_REMOTE_API_KEY }}" >> .bazelrc
      - name: Run Frontend Tests
        shell: bash
        run: |
          source env.sh
          gz_test //web/... --coverage
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: bazel-out/_coverage/_coverage_report.dat
          flags: frontend
          fail_ci_if_error: false

  publish:
    name: Publish OCI image
    needs: [preflight, backend-test, frontend-test, lint]
    if: ${{ always() && !cancelled() && (github.event_name == 'push' && ((needs.backend-test.result == 'success' && needs.frontend-test.result == 'success' && needs.lint.result == 'success') || needs.preflight.outputs.skip_main == 'true')) }}
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.sha }}

      - name: Cache Bazel Repository
        uses: actions/cache@v4
        with:
          path: ~/.cache/bazel/_bazel_runner/cache/repos/v1
          key: bazel-repo-${{ needs.preflight.outputs.deps_key }}
          restore-keys: bazel-repo-
      - name: Cache Bazel Disk
        uses: actions/cache@v4
        with:
          path: ~/.cache/bazel-disk-cache
          key: bazel-disk-publish-${{ needs.preflight.outputs.deps_key }}-${{ github.run_id }}
          restore-keys: |
            bazel-disk-publish-${{ needs.preflight.outputs.deps_key }}-
            bazel-disk-

      - name: Inject BuildBuddy API key into .bazelrc
        run: |
          echo "" >> .bazelrc
          echo "common:ci --remote_header=x-buildbuddy-api-key=${{ secrets.BAZEL_REMOTE_API_KEY }}" >> .bazelrc

      - name: Write Vite env file
        run: printf 'VITE_GOOGLE_CLIENT_ID=%s\n' '${{ secrets.VITE_GOOGLE_CLIENT_ID }}' > web/.env.local

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push OCI image
        run: |
          bazel run --config=ci --stamp //:push -- \
            --tag latest \
            --tag ${{ github.sha }}

  record-fingerprint:
    name: Record successful fingerprint
    needs: [preflight, lint, backend-test, frontend-test]
    if: ${{ github.event_name == 'pull_request' && needs.lint.result == 'success' && needs.backend-test.result == 'success' && needs.frontend-test.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Write fingerprint marker
        shell: bash
        run: |
          printf '%s\n' '${{ needs.preflight.outputs.fingerprint }}' > ci-fingerprint.txt

      - uses: actions/upload-artifact@v4
        with:
          name: ci-fingerprint-${{ needs.preflight.outputs.artifact_key }}
          path: ci-fingerprint.txt
          retention-days: 30
