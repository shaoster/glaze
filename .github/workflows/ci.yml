name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - ".gitignore"
      - ".gitattributes"
      - ".gitmodules"
      - ".mailmap"
      - ".editorconfig"
      - ".vscode/**"
      - ".idea/**"
      - "LICENSE"
      - "LICENSE.*"
  pull_request:

jobs:
  preflight:
    name: Preflight
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    outputs:
      fingerprint: ${{ steps.fingerprint.outputs.value }}
      artifact_key: ${{ steps.fingerprint.outputs.artifact_key }}
      skip_main: ${{ steps.lookup.outputs.skip_main }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - id: fingerprint
        name: Compute CI fingerprint
        shell: bash
        run: |
          tree="$(git rev-parse HEAD^{tree})"
          ci="$(sha256sum .github/workflows/ci.yml | cut -d' ' -f1)"
          bazel="$(sha256sum MODULE.bazel | cut -d' ' -f1)"
          py="$(sha256sum requirements.txt requirements-dev.txt | sha256sum | cut -d' ' -f1)"
          node="$(sha256sum web/pnpm-lock.yaml | cut -d' ' -f1)"
          value="${tree}-${ci}-${bazel}-${py}-${node}"
          artifact_key="$(printf '%s' "$value" | sha256sum | cut -d' ' -f1)"
          echo "value=$value" >> "$GITHUB_OUTPUT"
          echo "artifact_key=$artifact_key" >> "$GITHUB_OUTPUT"

      - id: lookup
        name: Check for prior successful PR validation
        uses: actions/github-script@v8
        env:
          ARTIFACT_KEY: ${{ steps.fingerprint.outputs.artifact_key }}
        with:
          script: |
            if (context.eventName !== 'push' || context.ref !== 'refs/heads/main') {
              core.setOutput('skip_main', 'false');
              return;
            }
            const artifactName = `ci-fingerprint-${process.env.ARTIFACT_KEY}`;
            const artifacts = await github.paginate(
              github.rest.actions.listArtifactsForRepo,
              { owner: context.repo.owner, repo: context.repo.repo, per_page: 100 }
            );
            const match = artifacts.find(
              artifact => artifact.name === artifactName && !artifact.expired
            );
            core.setOutput('skip_main', match ? 'true' : 'false');

  test:
    name: Test
    needs: preflight
    if: ${{ github.event_name == 'pull_request' || needs.preflight.outputs.skip_main != 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Bazelisk
        uses: bazelbuild/setup-bazelisk@v3

      - name: Cache Bazel outputs
        uses: actions/cache@v4
        with:
          path: ~/.cache/bazel
          key: bazel-${{ runner.os }}-${{ needs.preflight.outputs.artifact_key }}
          restore-keys: |
            bazel-${{ runner.os }}-

      - name: Run all tests
        run: bazel test --config=ci //...

      - name: Run all linters
        run: bazel build --config=ci --config=lint //...

  # Coverage runs outside Bazel until bazel coverage is wired up for
  # pytest and vitest — see https://github.com/shaoster/glaze/issues/159
  coverage:
    name: Coverage
    needs: preflight
    if: ${{ github.event_name == 'pull_request' || needs.preflight.outputs.skip_main != 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements-dev.txt -q

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install Node dependencies
        run: npm ci --prefix web

      - name: Backend coverage
        run: pytest api/ tests/ --cov=api --cov-report=lcov:coverage/lcov.info -q

      - name: Web coverage
        run: npm test --prefix web -- --coverage --reporter=dot

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: coverage/lcov.info,web/coverage/lcov.info
          flags: backend,frontend
          fail_ci_if_error: false

  record-fingerprint:
    name: Record successful fingerprint
    needs: [preflight, test, coverage]
    if: ${{ github.event_name == 'pull_request' && needs.test.result == 'success' && needs.coverage.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Write fingerprint marker
        shell: bash
        run: |
          printf '%s\n' '${{ needs.preflight.outputs.fingerprint }}' > ci-fingerprint.txt

      - uses: actions/upload-artifact@v4
        with:
          name: ci-fingerprint-${{ needs.preflight.outputs.artifact_key }}
          path: ci-fingerprint.txt
          retention-days: 30
