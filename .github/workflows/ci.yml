name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - '.gitignore'
      - '.gitattributes'
      - '.gitmodules'
      - '.mailmap'
      - '.editorconfig'
      - '.vscode/**'
      - '.idea/**'
      - 'LICENSE'
      - 'LICENSE.*'
  pull_request:

jobs:
  common:
    name: Common (workflow schema)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run tests
        run: pytest tests/

  backend:
    name: Backend (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run tests
        run: pytest api/

  web:
    name: Web (vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  web-build:
    name: Web (build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip

      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Node dependencies
        working-directory: web
        run: npm ci

      - name: Generate TypeScript types
        run: |
          python manage.py runserver 8080 &
          DJANGO_PID=$!
          echo "Waiting for Django on :8080..."
          for i in $(seq 1 30); do
            curl -sf http://localhost:8080/api/schema/ > /dev/null 2>&1 && break
            sleep 1
          done
          cd web && npm run generate-types
          kill "$DJANGO_PID"
          wait "$DJANGO_PID" 2>/dev/null || true

      - name: Build
        working-directory: web
        run: npm run build

  publish:
    name: Publish Docker image
    runs-on: ubuntu-latest
    needs: [common, backend, web, web-build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v5

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ghcr.io/shaoster/glaze:latest
            ghcr.io/shaoster/glaze:${{ github.sha }}
          build-args: |
            VITE_GOOGLE_CLIENT_ID=${{ secrets.VITE_GOOGLE_CLIENT_ID }}
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Create GitHub Release
        env:
          # Must use a PAT here — releases created via GITHUB_TOKEN do not
          # trigger other workflows (GitHub's anti-loop safety measure), so
          # the release: published event in cd.yml would never fire.
          GH_TOKEN: ${{ secrets.RELEASE_PAT }}
        run: |
          gh release create "release-${{ github.sha }}" \
            --title "Build ${{ github.sha }}" \
            --notes "Docker image published: \`ghcr.io/shaoster/glaze:${{ github.sha }}\`" \
            --latest
