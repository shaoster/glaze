name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  common:
    name: Common (workflow schema)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run tests
        run: pytest tests/

  backend:
    name: Backend (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run tests
        run: pytest api/

  web:
    name: Web (vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  web-build:
    name: Web (build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Node dependencies
        working-directory: web
        run: npm ci

      - name: Generate TypeScript types
        run: |
          python manage.py runserver 8080 &
          DJANGO_PID=$!
          echo "Waiting for Django on :8080..."
          for i in $(seq 1 30); do
            curl -sf http://localhost:8080/api/schema/ > /dev/null 2>&1 && break
            sleep 1
          done
          cd web && npm run generate-types
          kill "$DJANGO_PID"
          wait "$DJANGO_PID" 2>/dev/null || true

      - name: Build
        working-directory: web
        run: npm run build

  publish:
    name: Publish Docker image
    runs-on: ubuntu-latest
    needs: [common, backend, web, web-build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/shaoster/glaze:latest
          build-args: |
            VITE_GOOGLE_CLIENT_ID=${{ secrets.VITE_GOOGLE_CLIENT_ID }}
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}

  deploy:
    name: Deploy to droplet
    runs-on: ubuntu-latest
    needs: [publish]
    concurrency:
      group: deploy-production
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H $(echo "${{ secrets.DEPLOY_HOST }}" | cut -d@ -f2) >> ~/.ssh/known_hosts

      - name: Deploy
        run: ./deploy.sh "${{ secrets.DEPLOY_HOST }}"
