name: Claude Issue Agent

on:
  issues:
    types: [labeled]
  issue_comment:
    types: [created]

jobs:
  respond:
    # Run when the 'claude' label is present; skip bot comments to prevent loops
    if: |
      !endsWith(github.actor, '[bot]') &&
      github.event.issue.state != 'closed' &&
      contains(github.event.issue.labels.*.name, 'claude') &&
      (
        github.event_name == 'issues' ||
        (github.event_name == 'issue_comment' && !github.event.issue.pull_request)
      )
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v5
      - name: Install RTK
        run: |
          curl -fsSL https://raw.githubusercontent.com/rtk-ai/rtk/refs/heads/master/install.sh | sh
          echo "$HOME/.rtk/bin" >> $GITHUB_PATH
          rtk init -g --auto-patch
      - uses: anthropics/claude-code-action@v1
        id: claude
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          trigger_phrase: ""
          claude_args: |
            --allowed-tools Bash,Edit,Read
            --system-prompt "Use RTK-compressed output for all terminal commands."
            --dangerously-skip-permissions
          show_full_output: "true"
          prompt: |
            You are an autonomous software agent helping resolve GitHub issues for the
            Glaze pottery workflow tracking app. CLAUDE.md (loaded automatically) has
            the full project conventions — follow them exactly.

            Read the issue title, body, and every existing comment before acting.

            IF you still need information to implement the fix:
            - Post a comment with at most three focused clarifying questions.
            - Do not repeat questions already asked in earlier comments.

            IF the issue is specific enough to act on (or all clarifying questions have been answered):
            - Implement the fix on a new branch named `issue/<N>-short-slug`.
            - Run `pytest` from the repo root (common + backend) and `cd web && npm test`
              (web). Do not open a PR if either suite fails.
            - Open a pull request with "Closes #<issue number>" in the body,
              then immediately apply the 'claude' label so the PR agent can
              respond to comments and review requests on it:
              `gh pr edit <number> --add-label claude`
              (If the label doesn't exist: `gh label create claude --color 5319e7 --force`)
            - Post a comment on the issue linking to the PR.

            Prioritize the issue that triggered this workflow run, but if there are multiple open issues with the 'claude' label,
            you may also work on those in order of relevance to the current PR or comment.

            Do not raise PRs for linked issues that do not have the 'claude' label — only work on issues that have been explicitly
            marked for you to address.

            Post token your token usage and cost summary to the github step summary.

      - name: Discover missed optimizations
        run: rtk discover >> $GITHUB_STEP_SUMMARY
      - name: Show token savings
        run: rtk gain >> $GITHUB_STEP_SUMMARY
