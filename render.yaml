databases:
  - name: glaze-prod
    plan: free
    databaseName: glaze
    user: glaze

services:
  - type: web
    plan: free
    name: glaze
    runtime: python
    buildCommand: './build.sh'
    startCommand: 'python -m gunicorn backend.asgi:application -k uvicorn.workers.UvicornWorker'
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: glaze-prod
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: WEB_CONCURRENCY
        value: 4
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
