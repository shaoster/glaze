services:
  db:
    image: postgres:17
    restart: unless-stopped
    command: >
      postgres
        -c shared_buffers=256MB
        -c work_mem=8MB
        -c maintenance_work_mem=64MB
        -c max_connections=60
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: glaze
      POSTGRES_USER: glaze
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U glaze -d glaze"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    image: ghcr.io/shaoster/glaze:${IMAGE_TAG:?Set IMAGE_TAG in .env}
    restart: unless-stopped
    # deploy.sh scales to 2 replicas during rolling deploys, then back to 1.
    # Docker's internal DNS resolves "web" to all live replica IPs.
    deploy:
      replicas: 1
    environment:
      PRODUCTION: "true"
      DATABASE_URL: postgres://glaze:${POSTGRES_PASSWORD}@db:5432/glaze
      CELERY_BROKER_URL: redis://redis:6379/0
      REDIS_CACHE_URL: redis://redis:6379/1
      SECRET_KEY: ${SECRET_KEY}
      ALLOWED_HOST: ${ALLOWED_HOST}
      APP_ORIGIN: ${APP_ORIGIN}
      GOOGLE_OAUTH_CLIENT_ID: ${GOOGLE_OAUTH_CLIENT_ID:-}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-}
      CLOUDINARY_UPLOAD_FOLDER: ${CLOUDINARY_UPLOAD_FOLDER:-}
      CLOUDINARY_PUBLIC_UPLOAD_FOLDER: ${CLOUDINARY_PUBLIC_UPLOAD_FOLDER:-}
      CLOUDINARY_UPLOAD_PRESET: ${CLOUDINARY_UPLOAD_PRESET:-}
      REMOTE_REMBG_URL: ${REMOTE_REMBG_URL:-}
      MODAL_AUTH_TOKEN: ${MODAL_AUTH_TOKEN:-}
      OTEL_ENABLED: ${OTEL_ENABLED:-}
      OTEL_SERVICE_NAME: ${OTEL_SERVICE_NAME:-glaze}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otelcol:4317}
      OTEL_SAMPLE_RATE: ${OTEL_SAMPLE_RATE:-1.0}
      GRAFANA_CLOUD_OTLP_TOKEN: ${GRAFANA_CLOUD_OTLP_TOKEN:-}
      EMAIL_HOST: ${EMAIL_HOST:-smtp.resend.com}
      EMAIL_PORT: ${EMAIL_PORT:-465}
      EMAIL_HOST_USER: ${EMAIL_HOST_USER:-resend}
      EMAIL_HOST_PASSWORD: ${EMAIL_HOST_PASSWORD:-}
      EMAIL_USE_SSL: ${EMAIL_USE_SSL:-true}
      DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL:-noreply@potterdoc.com}
      INVITE_LINK_BASE_URL: ${INVITE_LINK_BASE_URL:-https://potterdoc.com}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      otelcol:
        condition: service_started
      deploy_init:
        condition: service_completed_successfully
    # Probes the API readiness endpoint. A 200 response means database,
    # migrations, and the async task backend are all usable. start_period
    # covers Gunicorn startup after the bootstrap service has completed.
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health/ready/', timeout=2).read()"
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    profiles: [production]
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # nginx config is version-controlled and mounted read-only; every deploy
      # picks up the config at the deployed git SHA automatically.
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      # Let's Encrypt certs managed by certbot on the host OS.
      - /etc/letsencrypt:/etc/letsencrypt:ro
      # ACME webroot challenge dir written by certbot on the host; nginx serves
      # /.well-known/acme-challenge/ from here for zero-downtime renewal.
      - /var/www/certbot-challenges:/var/www/certbot:ro
    depends_on:
      - web

  worker:
    image: ghcr.io/shaoster/glaze:${IMAGE_TAG:?Set IMAGE_TAG in .env}
    restart: unless-stopped
    command: python -m celery -A backend worker -l INFO
    environment:
      PRODUCTION: "true"
      DATABASE_URL: postgres://glaze:${POSTGRES_PASSWORD}@db:5432/glaze
      CELERY_BROKER_URL: redis://redis:6379/0
      REDIS_CACHE_URL: redis://redis:6379/1
      SECRET_KEY: ${SECRET_KEY}
      ALLOWED_HOST: ${ALLOWED_HOST}
      APP_ORIGIN: ${APP_ORIGIN}
      GOOGLE_OAUTH_CLIENT_ID: ${GOOGLE_OAUTH_CLIENT_ID:-}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-}
      CLOUDINARY_UPLOAD_FOLDER: ${CLOUDINARY_UPLOAD_FOLDER:-}
      CLOUDINARY_PUBLIC_UPLOAD_FOLDER: ${CLOUDINARY_PUBLIC_UPLOAD_FOLDER:-}
      CLOUDINARY_UPLOAD_PRESET: ${CLOUDINARY_UPLOAD_PRESET:-}
      REMOTE_REMBG_URL: ${REMOTE_REMBG_URL:-}
      MODAL_AUTH_TOKEN: ${MODAL_AUTH_TOKEN:-}
      OTEL_ENABLED: ${OTEL_ENABLED:-}
      OTEL_SERVICE_NAME: ${OTEL_SERVICE_NAME:-glaze-worker}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otelcol:4317}
      OTEL_SAMPLE_RATE: ${OTEL_SAMPLE_RATE:-1.0}
      GRAFANA_CLOUD_OTLP_TOKEN: ${GRAFANA_CLOUD_OTLP_TOKEN:-}
      EMAIL_HOST: ${EMAIL_HOST:-smtp.resend.com}
      EMAIL_PORT: ${EMAIL_PORT:-465}
      EMAIL_HOST_USER: ${EMAIL_HOST_USER:-resend}
      EMAIL_HOST_PASSWORD: ${EMAIL_HOST_PASSWORD:-}
      EMAIL_USE_SSL: ${EMAIL_USE_SSL:-true}
      DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL:-noreply@potterdoc.com}
      INVITE_LINK_BASE_URL: ${INVITE_LINK_BASE_URL:-https://potterdoc.com}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      deploy_init:
        condition: service_completed_successfully

  deploy_init:
    image: ghcr.io/shaoster/glaze:${IMAGE_TAG:?Set IMAGE_TAG in .env}
    restart: "no"
    # One-shot service that runs migrations, seeds the public library, and
    # clears abandoned tasks before the new release starts serving traffic.
    entrypoint:
      - bash
      - -lc
    command: >
      python manage.py migrate --no-input &&
      python manage.py load_public_library --skip-if-missing &&
      python manage.py clear_stuck_tasks --hours 1
    environment:
      PRODUCTION: "true"
      DATABASE_URL: postgres://glaze:${POSTGRES_PASSWORD}@db:5432/glaze
      SECRET_KEY: ${SECRET_KEY}
    depends_on:
      db:
        condition: service_healthy

  otelcol:
    # Memory Tip: If droplet memory is constrained, disabling this service
    # and setting OTEL_ENABLED=false can save ~50-100MB+.
    image: otel/opentelemetry-collector-contrib:0.126.0
    restart: unless-stopped
    volumes:
      - ./otel-collector-config.yml:/etc/otel/config.yml:ro
    command: ["--config=/etc/otel/config.yml"]
    environment:
      GRAFANA_CLOUD_OTLP_TOKEN: ${GRAFANA_CLOUD_OTLP_TOKEN:-}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

  mailpit:
    image: axllent/mailpit:latest
    restart: unless-stopped
    profiles: [mail]
    ports:
      - "8025:8025"
      - "1025:1025"

volumes:
  postgres_data:
