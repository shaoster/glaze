services:
  db:
    image: postgres:17
    restart: unless-stopped
    command: >
      postgres
        -c shared_buffers=32MB
        -c work_mem=4MB
        -c maintenance_work_mem=32MB
        -c max_connections=20
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: glaze
      POSTGRES_USER: glaze
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U glaze -d glaze"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    image: ghcr.io/shaoster/glaze:latest
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      PRODUCTION: "true"
      DATABASE_URL: postgres://glaze:${POSTGRES_PASSWORD}@db:5432/glaze
      SECRET_KEY: ${SECRET_KEY}
      ALLOWED_HOST: ${ALLOWED_HOST}
      APP_ORIGIN: ${APP_ORIGIN}
      GOOGLE_OAUTH_CLIENT_ID: ${GOOGLE_OAUTH_CLIENT_ID:-}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-}
      CLOUDINARY_UPLOAD_FOLDER: ${CLOUDINARY_UPLOAD_FOLDER:-}
      CLOUDINARY_PUBLIC_UPLOAD_FOLDER: ${CLOUDINARY_PUBLIC_UPLOAD_FOLDER:-}
      CLOUDINARY_UPLOAD_PRESET: ${CLOUDINARY_UPLOAD_PRESET:-}
      LOGTAIL_SOURCE_TOKEN: ${LOGTAIL_SOURCE_TOKEN:-}
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
