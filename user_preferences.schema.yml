$schema: "https://json-schema.org/draft/2020-12/schema"
title: Glaze User Preferences
type: object
required: [version, sections]
additionalProperties: false

properties:
  version:
    type: string
    description: Semantic version of this preferences definition.
    pattern: '^\d+\.\d+(\.\d+)?$'

  sections:
    type: array
    description: Ordered list of sections shown in the User Preferences UI.
    minItems: 1
    items:
      $ref: "#/$defs/section"

$defs:
  section:
    type: object
    required: [id, title, fields]
    additionalProperties: false
    properties:
      id:
        type: string
        description: Snake-case identifier for the section.
        pattern: '^[a-z][a-z0-9_-]*$'
      title:
        type: string
        description: Display title for the section.
      description:
        type: string
        description: Human-readable description shown in the UI.
      fields:
        type: object
        description: Map of field_id to field definition.
        minProperties: 1
        propertyNames:
          pattern: '^[a-z][a-z0-9_]*$'
        additionalProperties:
          $ref: "#/$defs/field"

  field:
    type: object
    required: [type, label, storage]
    additionalProperties: false
    properties:
      type:
        type: string
        enum: [string, field-list, boolean]
      label:
        type: string
      hint:
        type: string
      storage:
        type: string
        enum: [UserProfile, UserProfile.preferences]
      max_length:
        type: integer
        minimum: 1
      provider:
        type: string

    allOf:
      - if:
          properties:
            type: { const: string }
        then:
          required: [max_length]
      - if:
          properties:
            type: { const: field-list }
        then:
          required: [provider]
