<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PotterDoc — Piece List v2</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; background: oklch(0.16 0.008 60); min-height: 100vh; }
  body {
    font-family: 'Manrope', system-ui, sans-serif;
    color: oklch(0.94 0.012 80);
    display: flex; justify-content: center; align-items: flex-start;
    padding: 40px 20px;
  }
  .stage { display: flex; flex-direction: column; align-items: center; gap: 20px; }
  .label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase;
    color: oklch(0.58 0.01 60);
  }
  .title {
    font-family: 'Manrope', sans-serif;
    font-size: 22px; font-weight: 600; letter-spacing: -0.015em;
    color: oklch(0.92 0.01 80);
  }
  .sub {
    font-size: 13px; color: oklch(0.65 0.01 60);
    max-width: 380px; text-align: center; line-height: 1.5;
  }
</style>
</head>
<body>

<div class="stage">
  <div class="label">PieceList v2 · Mobile</div>
  <div class="title">2-col masonry · detail-consistent</div>
  <div class="sub">Variable card heights via CSS columns. Filled state chips overlaid on thumbnails. Bottom tabs, condensed filter, last-activity caption, truncated tags, strong-shadow FAB.</div>
  <div id="root"></div>
</div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="piece-list-v2.jsx"></script>

<script type="text/babel">
  const root = ReactDOM.createRoot(document.getElementById('root'));
  root.render(
    <IOSDevice width={390} height={844} dark={true}>
      <PieceListV2 />
    </IOSDevice>
  );
</script>
</body>
</html>
