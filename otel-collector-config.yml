receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317

  postgresql:
    endpoint: db:5432
    username: glaze
    password: ${env:POSTGRES_PASSWORD}
    databases: [glaze]
    collection_interval: 30s
    tls:
      insecure: true

  redis:
    endpoint: redis:6379
    collection_interval: 30s

  nginx:
    endpoint: http://nginx/nginx_status
    collection_interval: 30s

exporters:
  otlphttp:
    endpoint: https://otlp-gateway-prod-us-east-3.grafana.net/otlp
    headers:
      authorization: "Basic ${env:GRAFANA_CLOUD_OTLP_TOKEN}"

service:
  pipelines:
    traces:
      receivers: [otlp]
      exporters: [otlphttp]
    logs:
      receivers: [otlp]
      exporters: [otlphttp]
    metrics:
      receivers: [otlp, postgresql, redis, nginx]
      exporters: [otlphttp]
